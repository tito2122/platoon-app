<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>סד"כ</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyDnNEMrqQyi4Al38APHL2QSZh5Cdx5EF9U",
    authDomain: "class-1-9b07a.firebaseapp.com",
    projectId: "class-1-9b07a",
    storageBucket: "class-1-9b07a.firebasestorage.app",
    messagingSenderId: "176761569042",
    appId: "1:176761569042:web:591b8e01dbdc2e78627dcb"
  });
  const db = getFirestore(app);
  const soldiersCol = collection(db, "soldiers");

  window._db = db;
  window._collection = collection;
  window._soldiersCol = soldiersCol;
  window._setDoc = setDoc;
  window._deleteDoc = deleteDoc;
  window._doc = doc;
  window._onSnapshot = onSnapshot;
  window._firebaseReady = true;
  window.dispatchEvent(new Event('firebaseReady'));
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F0F2F5;--card:#FFFFFF;--card2:#F8F9FB;--border:#E2E6ED;
  --text:#1A1D23;--text2:#5A6070;--text3:#9BA3B2;
  --green:#1CB86A;--green-bg:#E8FAF1;--green-dark:#0F9454;
  --red:#E8354A;--red-bg:#FDEAEC;
  --amber:#F59E0B;--amber-bg:#FEF3C7;
  --blue:#2563EB;--blue-bg:#EFF6FF;
  --r:14px;--r-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --font:'Rubik',sans-serif;--hh:68px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);direction:rtl;font-size:16px;line-height:1.5;overscroll-behavior:none}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;will-change:transform}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.slide-left{transform:translateX(-38%);opacity:0;pointer-events:none}
.app-header{background:var(--card);border-bottom:1.5px solid var(--border);padding:0 16px;height:var(--hh);display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
.logo-icon{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,#1E40AF,#3B82F6);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 4px 12px rgba(37,99,235,.35)}
.title-wrap{flex:1;min-width:0}
.title-wrap h1{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.title-wrap .sub{font-size:12px;color:var(--text3)}
.dashboard{background:var(--card);border-bottom:1.5px solid var(--border);padding:14px 16px;flex-shrink:0}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat-box{border-radius:var(--r-sm);padding:12px 8px;text-align:center;border:1.5px solid transparent;cursor:pointer;transition:transform .12s,box-shadow .12s;user-select:none}
.stat-box:active{transform:scale(.94)}
.stat-box.s-blue{background:var(--blue-bg);border-color:#BFDBFE}
.stat-box.s-green{background:var(--green-bg);border-color:#A7F3D0}
.stat-box.s-red{background:var(--red-bg);border-color:#FECDD3}
.stat-box.s-dark{background:#1A1D23;border-color:#374151}
.stat-box.s-dark .stat-num{color:#fff}
.stat-box.s-dark .stat-lbl{color:#9BA3B2}
.stat-box.active-filter{box-shadow:0 0 0 3px rgba(0,0,0,.15);transform:scale(.97)}
.stat-num{font-size:30px;font-weight:900;line-height:1;margin-bottom:3px}
.s-blue .stat-num{color:var(--blue)}.s-green .stat-num{color:var(--green-dark)}.s-red .stat-num{color:var(--red)}
.stat-lbl{font-size:11px;font-weight:600;color:var(--text2)}
.role-stats{display:flex;gap:8px;flex-wrap:wrap}
.rcs{background:var(--card2);border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}
.rcs-cnt{background:var(--green);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}
.filter-banner{display:none;align-items:center;justify-content:space-between;padding:8px 16px;font-size:13px;font-weight:700;flex-shrink:0}
.filter-banner.show{display:flex}
.filter-banner.fb-green{background:#D1FAE5;color:var(--green-dark)}
.filter-banner.fb-red{background:#FEE2E2;color:var(--red)}
.fb-close{background:none;border:none;cursor:pointer;font-size:18px;color:inherit}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.list-pad{padding:14px 14px 100px}
.soldier-item{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);display:flex;align-items:center;gap:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s,transform .1s;min-height:76px;box-shadow:var(--shadow);user-select:none}
.soldier-item:active{transform:scale(.983);box-shadow:none}
.s-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.s-avatar.av-p{background:linear-gradient(135deg,#34D399,var(--green-dark))}
.s-avatar.av-a{background:linear-gradient(135deg,#F87171,var(--red))}
.s-info{flex:1;min-width:0}
.s-name{font-size:16px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-roles{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-badge{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;flex-shrink:0}
.s-badge.bp{background:var(--green-bg);color:var(--green-dark)}
.s-badge.ba{background:var(--red-bg);color:var(--red)}
.s-arrow{color:var(--text3);font-size:16px;flex-shrink:0}
.empty{text-align:center;padding:64px 24px;color:var(--text3)}
.empty .ei{font-size:60px;margin-bottom:18px;opacity:.55}
.empty h3{font-size:19px;font-weight:700;color:var(--text2);margin-bottom:8px}
.fab{position:fixed;bottom:86px;left:18px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#1E40AF,#3B82F6);color:#fff;font-size:28px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 24px rgba(37,99,235,.45);transition:transform .15s;z-index:30}
.fab:active{transform:scale(.88)}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1.5px solid var(--border);padding:12px 14px;z-index:20;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.btn-report{width:100%;min-height:52px;border-radius:var(--r-sm);border:none;background:linear-gradient(135deg,#1E40AF,#3B82F6);color:#fff;font-family:var(--font);font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 16px rgba(37,99,235,.35);transition:transform .12s}
.btn-report:active{transform:scale(.97)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:50px;padding:0 20px;border-radius:var(--r-sm);border:none;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn:active{transform:scale(.96)}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1.5px solid #FECDD3}
.btn-waze{background:#1CCAD8;color:#fff}
.btn-maps{background:#EA4335;color:#fff}
.btn-call{background:linear-gradient(135deg,#22C55E,var(--green-dark));color:#fff;font-size:16px;min-height:50px;border-radius:var(--r-sm);box-shadow:0 4px 16px rgba(28,184,106,.4)}
.btn-full{width:100%}
.btn-wa{background:#25D366;color:#fff;flex:1}
.btn-xl{background:#1D6F42;color:#fff;flex:1}
.btn-edit{background:var(--blue-bg);color:var(--blue);border:1.5px solid #BFDBFE;min-height:38px;padding:0 14px;font-size:13px;border-radius:20px}
.detail-header{background:var(--card);border-bottom:1.5px solid var(--border);padding:0 14px;height:var(--hh);display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-btn{width:46px;height:46px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--text2);flex-shrink:0;transition:background .15s}
.back-btn:active{background:var(--bg)}
.detail-title{flex:1;font-size:18px;font-weight:800;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabs-bar{display:flex;background:var(--card);border-bottom:1.5px solid var(--border);flex-shrink:0}
.tab-btn{flex:1;min-height:48px;border:none;background:transparent;font-family:var(--font);font-size:15px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;transition:all .18s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab-panel.active{display:block}
.tab-inner{padding:16px 14px 80px}
.field-view{background:var(--bg);border-radius:var(--r-sm);padding:13px 14px;margin-bottom:10px;border:1.5px solid var(--border)}
.field-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.field-val{font-size:15px;font-weight:600;color:var(--text);min-height:22px}
.field-val.empty-val{color:var(--text3);font-weight:400;font-style:italic}
.status-pill{display:inline-flex;align-items:center;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:700;border:1.5px solid}
.sp-present{background:var(--green-bg);border-color:var(--green);color:var(--green-dark)}
.sp-absent{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.sp-leave{background:var(--amber-bg);border-color:#FCD34D;color:#92400E}
.roles-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.role-pill{background:var(--blue-bg);color:var(--blue);border:1.5px solid #BFDBFE;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600}
.edit-section{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.edit-sec-hdr{padding:14px 18px 0;font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px}
.edit-sec-body{padding:14px 18px 18px}
.flbl{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:7px;display:block}
.finp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:13px 14px;color:var(--text);font-family:var(--font);font-size:15px;direction:rtl;outline:none;transition:border-color .15s;min-height:50px}
.finp:focus{border-color:var(--blue);background:#fff}
.finp::placeholder{color:var(--text3)}
textarea.finp{resize:vertical;min-height:80px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:9px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;min-height:42px;display:flex;align-items:center}
.chip.sel{background:#EFF6FF;border-color:var(--blue);color:var(--blue)}
.lv-rec{background:var(--card);border-radius:var(--r-sm);border:1.5px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.lv-info{flex:1}.lv-dates{font-size:14px;font-weight:700}.lv-days{font-size:12px;color:var(--text3);margin-top:2px}
.lv-del{width:36px;height:36px;border-radius:9px;border:1.5px solid #FECDD3;background:var(--red-bg);color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lv-del:active{background:var(--red);color:#fff}
.lv-form{background:var(--bg);border-radius:var(--r-sm);border:1.5px dashed var(--border);padding:14px;margin-top:8px;display:none}
.lv-form.open{display:block}
.lv-total-box{background:var(--amber-bg);border:1.5px solid #FCD34D;border-radius:var(--r-sm);padding:11px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.cal-wrap{background:var(--card);border-radius:var(--r-sm);overflow:hidden}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px}
.cal-nav-btn{font-size:22px;background:none;border:none;cursor:pointer;color:var(--text2);padding:0 6px}
.cal-month-lbl{font-size:15px;font-weight:700}
.cal-hint{text-align:center;font-size:12px;color:var(--text3);padding:0 0 6px;min-height:18px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:4px 10px 12px}
.cal-day-hdr{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:4px 0}
.cal-day{background:transparent;border:none;border-radius:8px;cursor:pointer;padding:7px 2px;font-size:14px;font-family:var(--font);text-align:center;transition:background .12s;color:var(--text);font-weight:500}
.cal-day.from,.cal-day.to{background:var(--green);color:#fff;font-weight:800;border-radius:50%}
.cal-day.in-range{background:var(--green-bg);color:var(--green-dark);font-weight:600}
.cal-day.disabled{color:var(--text3);cursor:default}
.cal-day.pending-from,.cal-day.pending-to{background:var(--amber-bg);color:#92400E;font-weight:800;border-radius:50%}
.cal-day.pending-range{background:#FEF3C7;color:#92400E;font-weight:600}
.nl-box{border-radius:var(--r-sm);padding:16px;border:2px solid var(--border);background:var(--bg);transition:all .25s}
.nl-box.approved{background:#DCFCE7;border-color:#86EFAC}
.ap-row{display:flex;align-items:center;gap:12px;margin-top:14px}
.ap-chk{width:26px;height:26px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.ap-lbl{font-size:15px;font-weight:600;cursor:pointer}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:24px 20px 36px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-drag{width:40px;height:5px;background:var(--border);border-radius:3px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:18px;text-align:center}
.rcal-wrap{background:var(--bg);border-radius:var(--r-sm);padding:10px;margin-bottom:18px}
.rcal-nav{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 10px}
.rcal-nav-btn{font-size:22px;background:none;border:none;cursor:pointer;color:var(--text2);padding:0 8px}
.rcal-month-lbl{font-size:15px;font-weight:700}
.rcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.rcal-hdr{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:4px 0}
.rcal-day{background:transparent;border:none;border-radius:8px;cursor:pointer;padding:8px 2px;font-size:14px;font-family:var(--font);text-align:center;transition:background .12s;color:var(--text);font-weight:500;width:100%}
.rcal-day:hover{background:var(--blue-bg)}
.rcal-day.selected{background:var(--blue);color:#fff;font-weight:800;border-radius:50%}
.rcal-day.today-mark{font-weight:800;color:var(--blue)}
.report-result{background:var(--green-bg);border:1.5px solid #A7F3D0;border-radius:var(--r-sm);padding:14px 16px;margin-bottom:14px;display:none}
.report-result.show{display:block}
.rr-date{font-size:13px;color:var(--text3);margin-bottom:6px}
.rr-names{font-size:14px;font-weight:600;line-height:1.8;white-space:pre-line}
.rr-count{font-size:13px;color:var(--green-dark);font-weight:700;margin-top:6px}
.share-row{display:flex;gap:10px;margin-top:10px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);background:#1A1D23;color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="screen" id="scr-main">
  <div class="app-header">
    <div class="logo-icon">🪖</div>
    <div class="title-wrap"><h1>מערכת ניהול סד"כ</h1><div class="sub">מחלקה 1</div></div>
  </div>
  <div class="dashboard">
    <div class="stats-row">
      <div class="stat-box s-blue" id="sb-all"><div class="stat-num" id="st-tot">0</div><div class="stat-lbl">סה"כ</div></div>
      <div class="stat-box s-green" id="sb-pr"><div class="stat-num" id="st-pr">0</div><div class="stat-lbl">נוכחים</div></div>
      <div class="stat-box s-red" id="sb-ab"><div class="stat-num" id="st-ab">0</div><div class="stat-lbl">חסרים</div></div>
      <div class="stat-box s-dark" id="sb-ms"><div class="stat-num" id="st-ms">0</div><div class="stat-lbl">🪦 נעדרים</div></div>
    </div>
    <div class="role-stats" id="role-stats"></div>
  </div>
  <div class="filter-banner" id="filter-banner">
    <span id="fb-label"></span>
    <button class="fb-close" id="fb-close">✕</button>
  </div>
  <div class="scroll-area"><div class="list-pad" id="list-wrap"></div></div>
  <button class="fab" id="fab">+</button>
  <div class="bottom-bar"><button class="btn-report" id="btn-report">📋 דו"ח 1</button></div>
</div>

<div class="screen hidden" id="scr-det">
  <div class="detail-header">
    <div class="back-btn" id="btn-back">←</div>
    <div class="detail-title" id="det-title">חייל</div>
    <button class="btn btn-danger" id="btn-del" style="min-height:38px;padding:0 14px;font-size:13px">🗑 הסר</button>
  </div>
  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="leaves">🏖️ יציאות</button>
    <button class="tab-btn" data-tab="info">📋 פרטים</button>
  </div>
  <div class="tab-panel active" id="tab-leaves"></div>
  <div class="tab-panel" id="tab-info"></div>
</div>

<!-- MISSING SOLDIERS MODAL -->
<div class="modal-overlay" id="modal-missing">
  <div class="modal-sheet" style="max-height:85vh;overflow-y:auto">
    <div class="modal-drag"></div>
    <div class="modal-title">🪦 נעדרים</div>
    <div id="missing-list" style="margin-bottom:16px"></div>
    <button class="btn btn-full" id="btn-add-missing" style="background:linear-gradient(135deg,#111827,#374151);color:#fff;min-height:50px;border-radius:var(--r-sm);border:none;font-family:var(--font);font-size:15px;font-weight:700;margin-bottom:12px">+ הוסף נעדר</button>
    <div id="missing-add-form" style="display:none;background:var(--bg);border-radius:var(--r-sm);border:1.5px dashed var(--border);padding:14px;margin-bottom:12px">
      <span class="flbl">שם החייל</span>
      <input class="finp" id="mf-name" type="text" placeholder="שם מלא..." style="margin-bottom:10px">
      <span class="flbl">סיבת היעדרות</span>
      <textarea class="finp" id="mf-reason" placeholder="סיבה..." rows="2" style="margin-bottom:10px"></textarea>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" id="mf-cancel" style="flex:1">ביטול</button>
        <button class="btn btn-full" id="mf-save" style="flex:1;background:linear-gradient(135deg,#111827,#374151);color:#fff;border:none">שמור</button>
      </div>
    </div>
    <button class="btn btn-ghost btn-full" id="modal-missing-close">סגור</button>
  </div>
</div>

<div class="modal-overlay" id="modal-report">
  <div class="modal-sheet">
    <div class="modal-drag"></div>
    <div class="modal-title">📋 דו"ח 1</div>
    <div class="rcal-wrap">
      <div class="rcal-nav">
        <button class="rcal-nav-btn" id="rcal-prev">‹</button>
        <span class="rcal-month-lbl" id="rcal-lbl"></span>
        <button class="rcal-nav-btn" id="rcal-next">›</button>
      </div>
      <div class="rcal-grid" id="rcal-grid"></div>
    </div>
    <div class="report-result" id="report-result">
      <div class="rr-date" id="rr-date"></div>
      <div class="rr-names" id="rr-names"></div>
      <div class="rr-count" id="rr-count"></div>
      <div class="share-row">
        <button class="btn btn-wa" id="rr-wa">📲 WhatsApp</button>
        <button class="btn btn-xl" id="rr-xl">📊 Excel</button>
      </div>
    </div>
    <button class="btn btn-ghost btn-full" id="modal-close">סגור</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="loading-overlay" style="position:fixed;inset:0;background:#F0F2F5;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px">
  <div style="font-size:48px">🪖</div>
  <div style="font-size:16px;font-weight:700;color:#5A6070">טוען נתונים...</div>
  <div style="width:40px;height:40px;border:4px solid #E2E6ED;border-top-color:#2563EB;border-radius:50%;animation:spin .8s linear infinite"></div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<script>
(function(){
var ROLES=['חובש','מאג','מטול','קלע','מ"כ','סמ"ל','מפקד מחלקה','רוגר','צלף','מטאדור','נהג נגמ"ש'];
var KEY=[0,4,6];
var MONTHS_HE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
var DAYS_HE=['א','ב','ג','ד','ה','ו','ש'];

var state={soldiers:[],missing:[],nid:1,nmid:1,active:null,filter:'all'};

function saveSoldier(s){
  if(!window._firebaseReady)return;
  var docRef=window._doc(window._soldiersCol,String(s.id));
  window._setDoc(docRef, JSON.parse(JSON.stringify(s)));
}
function deleteSoldierRemote(id){
  if(!window._firebaseReady)return;
  var docRef=window._doc(window._soldiersCol,String(id));
  window._deleteDoc(docRef);
}
function startSync(){
  if(!window._firebaseReady){window.addEventListener('firebaseReady',startSync,{once:true});return;}
  window._onSnapshot(window._soldiersCol, function(snapshot){
    var incoming=[];
    snapshot.forEach(function(d){incoming.push(d.data());});
    var maxId=0;
    incoming.forEach(function(s){if(s.id>maxId)maxId=s.id;});
    if(maxId>=state.nid)state.nid=maxId+1;
    state.soldiers=incoming;
    if(document.getElementById('scr-main')&&!document.getElementById('scr-main').classList.contains('hidden')){
      renderMain();
    }
    var lo=document.getElementById('loading-overlay');
    if(lo)lo.style.display='none';
  });
  var missingCol=window._collection(window._db,'missing');
  window._onSnapshot(missingCol, function(snapshot){
    var inc=[];snapshot.forEach(function(d){inc.push(d.data());});
    var mx=0;inc.forEach(function(m){if(m.id>mx)mx=m.id;});
    if(mx>=state.nmid)state.nmid=mx+1;
    state.missing=inc;
    document.getElementById('st-ms').textContent=state.missing.length;
  });
}
function mkSoldier(){return{id:state.nid++,name:'',firstName:'',lastName:'',personalId:'',photoData:'',status:'present',roles:[],phone:'',residence:'',leaves:[],nextFrom:'',nextTo:'',nextApproved:false,notes:'',hasWife:false,wifeName:'',wifePhone:'',hasKids:false,kids:[],nextNotes:''};}
function find(id){return state.soldiers.find(function(s){return s.id===id;});}
function initials(n){var p=(n||'').trim().split(/\s+/).filter(Boolean);if(!p.length)return'?';if(p.length===1)return p[0].slice(0,2);return p[0][0]+(p[p.length-1][0]||'');}
function calcDays(a,b){if(!a||!b)return 0;var d=(new Date(b)-new Date(a))/864e5;return d>0?Math.round(d):0;}
function toDateStr(y,m,d){return y+'-'+(m<9?'0':'')+(m+1)+'-'+(d<10?'0':'')+d;}
function today(){var n=new Date();return toDateStr(n.getFullYear(),n.getMonth(),n.getDate());}
function fmtDate(s){if(!s)return'';var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fmtDateHe(s){if(!s)return'';var p=s.split('-');return p[2]+' ב'+MONTHS_HE[+p[1]-1]+' '+p[0];}

function checkNextExpiry(s){
  if(s.nextApproved&&s.nextFrom&&s.nextTo&&s.nextTo<today()){
    s.leaves.push({from:s.nextFrom,to:s.nextTo});
    s.nextFrom='';s.nextTo='';s.nextApproved=false;
    saveSoldier(s);
  }
}
function getStatusInfo(s){
  var td=today();
  for(var i=0;i<s.leaves.length;i++){if(td>=s.leaves[i].from&&td<s.leaves[i].to)return{label:'🏖️ בחופשה',cls:'sp-leave'};}
  if(s.nextApproved&&s.nextFrom&&s.nextTo&&td>=s.nextFrom&&td<s.nextTo)return{label:'🏖️ בחופשה',cls:'sp-leave'};
  if(s.status==='present')return{label:'✅ נוכח',cls:'sp-present'};
  return{label:'❌ חסר',cls:'sp-absent'};
}
function presentOnDate(s,ds){
  if(s.status!=='present')return false;
  for(var i=0;i<s.leaves.length;i++){if(ds>=s.leaves[i].from&&ds<s.leaves[i].to)return false;}
  if(s.nextApproved&&s.nextFrom&&s.nextTo&&ds>=s.nextFrom&&ds<s.nextTo)return false;
  return true;
}

var _tt=null;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},2500);}

function setFilter(f){
  state.filter=f;
  var banner=document.getElementById('filter-banner');
  document.getElementById('sb-all').classList.toggle('active-filter',f==='all');
  document.getElementById('sb-pr').classList.toggle('active-filter',f==='present');
  document.getElementById('sb-ab').classList.toggle('active-filter',f==='absent');
  document.getElementById('sb-ms').classList.toggle('active-filter',f==='missing');
  if(f==='present'){banner.className='filter-banner show fb-green';document.getElementById('fb-label').textContent='מציג נוכחים בלבד';}
  else if(f==='absent'){banner.className='filter-banner show fb-red';document.getElementById('fb-label').textContent='מציג חסרים בלבד';}
  else{banner.className='filter-banner';}
  renderList();
}

function showMain(){
  document.getElementById('scr-det').classList.add('hidden');
  document.getElementById('scr-det').classList.remove('slide-left');
  document.getElementById('scr-main').classList.remove('hidden','slide-left');
  renderMain();
}
function showDetail(id){
  state.active=id;
  document.getElementById('scr-main').classList.add('slide-left');
  document.getElementById('scr-det').classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab==='leaves');});
  document.getElementById('tab-leaves').classList.add('active');
  document.getElementById('tab-info').classList.remove('active');
  document.querySelector('.tabs-bar').style.display='flex';
  renderDetail(id);
}
function showDetailNewSoldier(id){
  try{
    state.active=id;
    document.getElementById('scr-main').classList.add('slide-left');
    document.getElementById('scr-det').classList.remove('hidden');
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab==='info');});
    document.getElementById('tab-info').classList.add('active');
    document.getElementById('tab-leaves').classList.remove('active');
    renderDetail(id);
  }catch(e){
    document.getElementById('scr-main').classList.remove('slide-left');
    document.getElementById('scr-det').classList.add('hidden');
    toast('שגיאה בפתיחת כרטיס: '+e.message);
  }
}
function renderMain(){updateStats();renderList();}
function updateStats(){
  var activeSoldiers=state.soldiers.filter(function(s){return !s.isMissing;});
  var pr=activeSoldiers.filter(function(s){return getStatusInfo(s).cls==='sp-present';});
  var ab=activeSoldiers.filter(function(s){return getStatusInfo(s).cls!=='sp-present';});
  document.getElementById('st-tot').textContent=activeSoldiers.length;
  document.getElementById('st-pr').textContent=pr.length;
  document.getElementById('st-ab').textContent=ab.length;
  document.getElementById('st-ms').textContent=state.missing.length;
  var rs=document.getElementById('role-stats');rs.innerHTML='';
  // באנרים כחולים של תפקידים נוכחים
  var roleWrap=document.createElement('div');roleWrap.style.cssText='display:flex;flex-wrap:wrap;gap:6px';
  ROLES.forEach(function(role){
    var cnt=pr.filter(function(s){return s.roles.indexOf(role)!==-1;}).length;
    if(cnt===0)return;
    var tag=document.createElement('div');
    tag.style.cssText='background:#1E40AF;color:#fff;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px';
    tag.innerHTML='<span>'+role+'</span><span style="background:rgba(255,255,255,0.25);border-radius:10px;padding:1px 6px;font-size:10px">'+cnt+'</span>';
    roleWrap.appendChild(tag);
  });
  rs.appendChild(roleWrap);
}
function renderList(){
  var wrap=document.getElementById('list-wrap');wrap.innerHTML='';
  state.soldiers.forEach(function(s){checkNextExpiry(s);});
  var list=state.soldiers.filter(function(s){
    if(s.isMissing)return false;
    if(state.filter==='present')return s.status==='present'&&getStatusInfo(s).cls!=='sp-leave';
    if(state.filter==='absent')return s.status==='absent'||getStatusInfo(s).cls==='sp-leave';
    return true;
  }).sort(function(a,b){
    var la=a.lastName||a.name||'', lb=b.lastName||b.name||'';
    return la.localeCompare(lb,'he');
  });
  if(!list.length){
    var es=document.createElement('div');es.className='empty';
    es.innerHTML='<div class="ei">🪖</div><h3>'+(state.filter==='all'?'אין חיילים עדיין':'אין חיילים ברשימה זו')+'</h3><p>'+(state.filter==='all'?'לחץ + להוספת חייל ראשון':'')+'</p>';
    wrap.appendChild(es);return;
  }
  list.forEach(function(s){
    var st=getStatusInfo(s);
    var item=document.createElement('div');item.className='soldier-item';
    var av=document.createElement('div');av.className='s-avatar '+(getStatusInfo(s).cls==='sp-present'?'av-p':'av-a');av.textContent=initials(s.name||'?');
    var info=document.createElement('div');info.className='s-info';
    info.innerHTML='<div class="s-name">'+(s.name||'חייל חדש')+'</div><div class="s-roles">'+(s.roles.length?s.roles.join(' · '):'ללא תפקיד')+'</div>';
    var badge=document.createElement('div');badge.className='s-badge '+(s.status==='present'?'bp':'ba');badge.textContent=st.label;
    item.appendChild(av);item.appendChild(info);item.appendChild(badge);item.appendChild((function(){var a=document.createElement('span');a.className='s-arrow';a.textContent='‹';return a;})());
    item.addEventListener('click',function(){showDetail(s.id);});
    wrap.appendChild(item);
  });
}

function renderDetail(id){
  var s=find(id);if(!s){showMain();return;}
  try{
    checkNextExpiry(s);
    document.getElementById('det-title').textContent=s.name||'חייל חדש';
    buildInfoTab(s);
    buildLeavesTab(s);
  }catch(e){
    toast('שגיאה בטעינת כרטיס');
    console.error(e);
  }
}

/* ═══ INFO TAB ═══ */
function buildInfoTab(s){
  var panel=document.getElementById('tab-info');
  panel.innerHTML='';
  var inner=document.createElement('div');inner.className='tab-inner';

  var editMode=!s.name.trim();

  function renderView(){
    inner.innerHTML='';
    var st=getStatusInfo(s);

    // תמונה + סטטוס בראש
    var topRow=document.createElement('div');topRow.style.cssText='display:flex;align-items:center;gap:14px;margin-bottom:16px';
    var avatarWrap=document.createElement('div');avatarWrap.style.cssText='flex-shrink:0';
    if(s.photoData){
      var photoImg=document.createElement('img');photoImg.src=s.photoData;photoImg.style.cssText='width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--border)';
      avatarWrap.appendChild(photoImg);
    } else {
      var bigAv=document.createElement('div');bigAv.style.cssText='width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;background:linear-gradient(135deg,#34D399,var(--green-dark))';
      bigAv.textContent=initials(s.name||'?');
      avatarWrap.appendChild(bigAv);
    }
    var topInfo=document.createElement('div');topInfo.style.cssText='flex:1;min-width:0';
    var stBox=document.createElement('div');stBox.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:6px';
    var pill=document.createElement('div');pill.className='status-pill '+st.cls;pill.textContent=st.label;
    var editBtn=document.createElement('button');editBtn.className='btn btn-edit';editBtn.textContent='✏️ עריכה';
    editBtn.addEventListener('click',function(){editMode=true;renderEdit();});
    stBox.appendChild(pill);stBox.appendChild(editBtn);
    topInfo.appendChild(stBox);
    topRow.appendChild(avatarWrap);topRow.appendChild(topInfo);
    inner.appendChild(topRow);

    var nameViewBox=document.createElement('div');nameViewBox.className='field-view';
    var nameLblEl=document.createElement('div');nameLblEl.className='field-lbl';nameLblEl.textContent='שם';
    var nameValEl=document.createElement('div');nameValEl.className='field-val';
    nameValEl.textContent=(s.lastName&&s.firstName)?(s.lastName+' '+s.firstName):s.name||'';
    nameViewBox.appendChild(nameLblEl);nameViewBox.appendChild(nameValEl);
    inner.appendChild(nameViewBox);

    // מספר אישי
    var idBox=document.createElement('div');idBox.className='field-view';
    var idLbl=document.createElement('div');idLbl.className='field-lbl';idLbl.textContent='מספר אישי';
    var idVal=document.createElement('div');idVal.className='field-val'+(s.personalId&&s.personalId.trim()?'':' empty-val');
    idVal.textContent=s.personalId&&s.personalId.trim()?s.personalId:'לא הוזן';
    idBox.appendChild(idLbl);idBox.appendChild(idVal);
    inner.appendChild(idBox);

    var rf=document.createElement('div');rf.className='field-view';
    var rl=document.createElement('div');rl.className='field-lbl';rl.textContent='תפקידים';
    rf.appendChild(rl);
    if(s.roles.length){
      var rp=document.createElement('div');rp.className='roles-pills';
      s.roles.forEach(function(r){var p=document.createElement('span');p.className='role-pill';p.textContent=r;rp.appendChild(p);});
      rf.appendChild(rp);
    } else {
      var rv=document.createElement('div');rv.className='field-val empty-val';rv.textContent='ללא תפקיד';rf.appendChild(rv);
    }
    inner.appendChild(rf);

    var phoneRow=document.createElement('div');phoneRow.className='field-view';
    var phl=document.createElement('div');phl.className='field-lbl';phl.textContent='טלפון';
    phoneRow.appendChild(phl);
    if(s.phone){
      var phv=document.createElement('div');phv.className='field-val';phv.style.cssText='display:flex;align-items:center;justify-content:space-between';
      var pht=document.createElement('span');pht.textContent=s.phone;
      var callA=document.createElement('a');callA.className='btn btn-call';callA.style.cssText='min-height:38px;padding:0 16px;font-size:14px';callA.textContent='📞 התקשר';callA.href='tel:'+s.phone;
      phv.appendChild(pht);phv.appendChild(callA);
      phoneRow.appendChild(phv);
    } else {
      var phEmpty=document.createElement('div');phEmpty.className='field-val empty-val';phEmpty.textContent='לא הוזן';phoneRow.appendChild(phEmpty);
    }
    inner.appendChild(phoneRow);

    var resBox=document.createElement('div');resBox.className='field-view';
    var resl=document.createElement('div');resl.className='field-lbl';resl.textContent='מגורים';
    resBox.appendChild(resl);
    if(s.residence){
      var resv=document.createElement('div');resv.className='field-val';resv.textContent=s.residence;resBox.appendChild(resv);
      var navRow=document.createElement('div');navRow.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px';
      var wb=document.createElement('button');wb.className='btn btn-waze btn-full';wb.textContent='Waze 🗺️';wb.style.minHeight='42px';
      var gb=document.createElement('button');gb.className='btn btn-maps btn-full';gb.textContent='Maps 📍';gb.style.minHeight='42px';
      wb.addEventListener('click',function(){window.open('https://waze.com/ul?q='+encodeURIComponent(s.residence),'_blank');});
      gb.addEventListener('click',function(){window.open('https://maps.google.com/?q='+encodeURIComponent(s.residence),'_blank');});
      navRow.appendChild(wb);navRow.appendChild(gb);resBox.appendChild(navRow);
    } else {
      var resEmpty=document.createElement('div');resEmpty.className='field-val empty-val';resEmpty.textContent='לא הוזן';resBox.appendChild(resEmpty);
    }
    inner.appendChild(resBox);

    // הערות - עריכה ישירה ללא לחיצה על עריכה
    var notesBox=document.createElement('div');notesBox.className='field-view';
    var notesLbl=document.createElement('div');notesLbl.className='field-lbl';notesLbl.textContent='הערות';
    var notesTa=document.createElement('textarea');notesTa.className='finp';notesTa.style.cssText='margin-top:4px;min-height:70px;font-size:14px';
    notesTa.placeholder='הערות כלליות...';notesTa.value=s.notes||'';notesTa.rows=3;
    notesTa.addEventListener('input',function(){s.notes=notesTa.value;saveSoldier(s);});
    notesBox.appendChild(notesLbl);notesBox.appendChild(notesTa);
    inner.appendChild(notesBox);

    if(s.hasWife){
      var famBox=document.createElement('div');famBox.className='field-view';
      var famLbl=document.createElement('div');famLbl.className='field-lbl';famLbl.textContent='משפחה';
      famBox.appendChild(famLbl);
      var wifeRow=document.createElement('div');wifeRow.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:6px';
      var wt=document.createElement('div');wt.className='field-val';wt.textContent='💍 '+(s.wifeName||'אישה');
      var wcallA=document.createElement('a');wcallA.className='btn btn-call';wcallA.style.cssText='min-height:34px;padding:0 14px;font-size:13px';wcallA.textContent='📞';wcallA.href='tel:'+(s.wifePhone||'');
      if(s.wifePhone){wifeRow.appendChild(wt);wifeRow.appendChild(wcallA);}else{wifeRow.appendChild(wt);}
      famBox.appendChild(wifeRow);
      if(s.hasKids&&s.kids&&s.kids.length){
        var kl=document.createElement('div');kl.style.cssText='margin-top:6px;display:flex;flex-wrap:wrap;gap:6px';
        s.kids.filter(Boolean).forEach(function(k){var p=document.createElement('span');p.className='role-pill';p.textContent='👶 '+k;kl.appendChild(p);});
        famBox.appendChild(kl);
      }
      inner.appendChild(famBox);
    }
  }

  function addViewField(parent,label,val){
    var box=document.createElement('div');box.className='field-view';
    var l=document.createElement('div');l.className='field-lbl';l.textContent=label;
    var v=document.createElement('div');v.className='field-val'+(val&&val.trim()?'':' empty-val');v.textContent=val&&val.trim()?val:'לא הוזן';
    box.appendChild(l);box.appendChild(v);parent.appendChild(box);
  }

  function renderEdit(){
    inner.innerHTML='';

    // ── NAME ──
    var sec0=mkSec('שם החייל');
    var nameRow=document.createElement('div');nameRow.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px';
    var niLast=mkInp('text','שם משפחה...',s.lastName||'');
    var niFirst=mkInp('text','שם פרטי...',s.firstName||'');
    var nameBanner=document.createElement('div');
    nameBanner.style.cssText='display:none;background:#FEE2E2;border:1.5px solid #FECDD3;border-radius:var(--r-sm);padding:9px 14px;margin-top:8px;font-size:13px;font-weight:700;color:var(--red);text-align:center';

    function updateName(){
      var first=niFirst.value.trim();
      var last=niLast.value.trim();
      var full=(last&&first)?(last+' '+first):(last||first);
      if(!full){
        nameBanner.textContent='⚠️ מילוי שם חובה';nameBanner.style.display='block';
      } else {
        var dup=state.soldiers.some(function(x){return x.id!==s.id&&(x.name||'').trim()===full;});
        if(dup){nameBanner.textContent='⚠️ כבר קיים חייל עם השם הזה';nameBanner.style.display='block';}
        else{
          nameBanner.style.display='none';
          s.firstName=niFirst.value;
          s.lastName=niLast.value;
          s.name=full;
          document.getElementById('det-title').textContent=s.name;
          saveSoldier(s);
        }
      }
    }
    niFirst.addEventListener('input',updateName);
    niLast.addEventListener('input',updateName);
    nameRow.appendChild(niLast);nameRow.appendChild(niFirst);
    sec0.body.appendChild(nameRow);sec0.body.appendChild(nameBanner);inner.appendChild(sec0.el);
    if(!s.name.trim()){
      setTimeout(function(){nameBanner.textContent='⚠️ מילוי שם חובה';nameBanner.style.display='block';niLast.focus();},80);
    }

    // ── PHOTO ──
    var secPhoto=mkSec('תמונת חייל');
    var photoWrap=document.createElement('div');photoWrap.style.cssText='display:flex;align-items:center;gap:14px';
    var photoPreview=document.createElement('div');
    photoPreview.style.cssText='width:72px;height:72px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:24px;font-weight:800;color:#fff';
    if(s.photoData){
      var prevImg=document.createElement('img');prevImg.src=s.photoData;prevImg.style.cssText='width:100%;height:100%;object-fit:cover';
      photoPreview.appendChild(prevImg);
    } else {
      var prevAv=document.createElement('div');prevAv.style.cssText='width:100%;height:100%;background:linear-gradient(135deg,#34D399,var(--green-dark));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff';
      prevAv.textContent=initials(s.name||'?');
      photoPreview.appendChild(prevAv);

/* ── CALENDAR ── */
function buildCal(s,mode,onSave){
  var wrap=document.createElement('div');
  var cw=document.createElement('div');cw.className='cal-wrap';
  var nav=document.createElement('div');nav.className='cal-nav';
  var prev=document.createElement('button');prev.className='cal-nav-btn';prev.textContent='‹';
  var nxt=document.createElement('button');nxt.className='cal-nav-btn';nxt.textContent='›';
  var lbl=document.createElement('span');lbl.className='cal-month-lbl';
  var hint=document.createElement('div');hint.className='cal-hint';
  var grid=document.createElement('div');grid.className='cal-grid';
  nav.appendChild(prev);nav.appendChild(lbl);nav.appendChild(nxt);
  cw.appendChild(nav);cw.appendChild(hint);cw.appendChild(grid);
  var cy=new Date().getFullYear(),cm=new Date().getMonth();
  var pf=mode==='next'&&s.nextFrom?s.nextFrom:null;
  var pt=mode==='next'&&s.nextTo?s.nextTo:null;
  function rc(){
    lbl.textContent=MONTHS_HE[cm]+' '+cy;
    if(!pf)hint.textContent='בחר תאריך תחילה';
    else if(!pt)hint.textContent='עכשיו בחר תאריך סיום';
    else hint.textContent=fmtDate(pf)+' → '+fmtDate(pt)+' ('+calcDays(pf,pt)+' ימים)';
    grid.innerHTML='';
    DAYS_HE.forEach(function(d){var h=document.createElement('div');h.className='cal-day-hdr';h.textContent=d;grid.appendChild(h);});
    var fd=new Date(cy,cm,1).getDay();
    for(var i=0;i<fd;i++)grid.appendChild(document.createElement('div'));
    var dim=new Date(cy,cm+1,0).getDate();
    for(var d=1;d<=dim;d++){
      var ds=toDateStr(cy,cm,d);
      var isPast=pf&&!pt&&ds<pf;
      var isBeforeToday=mode==='next'&&ds<today();
      var cls='cal-day';
      if(mode==='next'){
        if(ds===pf||ds===pt)cls+=' pending-from';
        else if(pf&&pt&&ds>pf&&ds<pt)cls+=' pending-range';
        else if(isPast||isBeforeToday)cls+=' disabled';
      } else {
        if(ds===pf||ds===pt)cls+=' from';
        else if(pf&&pt&&ds>pf&&ds<pt)cls+=' in-range';
        else if(isPast)cls+=' disabled';
      }
      var btn=document.createElement('button');btn.className=cls;btn.textContent=d;
      if(!isPast&&!isBeforeToday)(function(ds2){btn.addEventListener('click',function(){
        if(!pf||pt){pf=ds2;pt=null;}
        else{if(ds2<=pf){pf=ds2;pt=null;}else{pt=ds2;onSave(pf,pt);pf=null;pt=null;}}
        rc();
      });})(ds);
      grid.appendChild(btn);
    }
  }
  prev.addEventListener('click',function(){cm--;if(cm<0){cm=11;cy--;}rc();});
  nxt.addEventListener('click',function(){cm++;if(cm>11){cm=0;cy++;}rc();});
  rc();
  var cn=document.createElement('button');cn.className='btn btn-ghost btn-full';cn.textContent='ביטול';cn.style.marginTop='8px';
  wrap.appendChild(cw);wrap.appendChild(cn);
  return{el:wrap,cancel:cn,reset:function(){pf=null;pt=null;rc();}};
}

/* ── REPORT MODAL ── */
var rcalYear=new Date().getFullYear(),rcalMonth=new Date().getMonth(),rcalSel=null;
function openReportModal(){rcalSel=null;document.getElementById('report-result').classList.remove('show');renderRcal();document.getElementById('modal-report').classList.add('show');}
function closeReportModal(){document.getElementById('modal-report').classList.remove('show');}
function renderRcal(){
  document.getElementById('rcal-lbl').textContent=MONTHS_HE[rcalMonth]+' '+rcalYear;
  var grid=document.getElementById('rcal-grid');grid.innerHTML='';
  DAYS_HE.forEach(function(d){var h=document.createElement('div');h.className='rcal-hdr';h.textContent=d;grid.appendChild(h);});
  var fd=new Date(rcalYear,rcalMonth,1).getDay();
  for(var i=0;i<fd;i++)grid.appendChild(document.createElement('div'));
  var td=today(),dim=new Date(rcalYear,rcalMonth+1,0).getDate();
  for(var d=1;d<=dim;d++){
    var ds=toDateStr(rcalYear,rcalMonth,d);
    var btn=document.createElement('button');btn.className='rcal-day'+(ds===rcalSel?' selected':'')+(ds===td?' today-mark':'');btn.textContent=d;
    (function(ds2){btn.addEventListener('click',function(){rcalSel=ds2;renderRcal();showReportResult(ds2);});})(ds);
    grid.appendChild(btn);
  }
}
function showReportResult(ds){
  var pl=state.soldiers.filter(function(s){
    if(s.status!=='present')return false;
    for(var i=0;i<s.leaves.length;i++){if(ds>=s.leaves[i].from&&ds<s.leaves[i].to)return false;}
    if(s.nextApproved&&s.nextFrom&&s.nextTo&&ds>=s.nextFrom&&ds<s.nextTo)return false;
    return true;
  });
  if(!pl.length){
    toast('אין נוכחים להצגה ביום זה');
    rcalSel=null;renderRcal();
    document.getElementById('report-result').classList.remove('show');
    return;
  }
  document.getElementById('rr-date').textContent='תאריך: '+fmtDateHe(ds);
  document.getElementById('rr-names').textContent=pl.map(function(s,i){return(i+1)+'. '+(s.name||'חייל');}).join('\n');
  document.getElementById('rr-count').textContent='סה"כ נוכחים: '+pl.length+' חיילים';
  document.getElementById('report-result').classList.add('show');
  document.getElementById('rr-wa').onclick=function(){
    var msg='🪖 *דו"ח נוכחות — '+fmtDateHe(ds)+'*\n\n✅ *נוכחים ('+pl.length+'):*\n'+pl.map(function(s,i){return(i+1)+'. '+(s.name||'חייל');}).join('\n');
    window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
  };
  document.getElementById('rr-xl').onclick=function(){
    var rows=[['#','שם','תפקידים','טלפון','מגורים']].concat(pl.map(function(s,i){return[i+1,s.name||'',s.roles.join(' | '),s.phone||'',s.residence||''];}));
    var csv='\uFEFF'+rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
    var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download='נוכחות_'+ds+'.csv';a.click();toast('הקובץ הורד ✓');
  };
}

function getMissingCol(){return window._collection(window._db,'missing');}
function saveMissing(m){
  if(!window._firebaseReady)return;
  window._setDoc(window._doc(getMissingCol(),String(m.id)),JSON.parse(JSON.stringify(m)));
}
function deleteMissing(id){
  if(!window._firebaseReady)return;
  window._deleteDoc(window._doc(getMissingCol(),String(id)));
}
function openMissingModal(){
  renderMissingList();
  document.getElementById('missing-add-form').style.display='none';
  document.getElementById('mf-name').value='';
  document.getElementById('mf-reason').value='';
  document.getElementById('modal-missing').classList.add('show');
}
function closeMissingModal(){document.getElementById('modal-missing').classList.remove('show');}
function renderMissingList(){
  var wrap=document.getElementById('missing-list');wrap.innerHTML='';
  if(!state.missing.length){
    var em=document.createElement('div');em.style.cssText='text-align:center;padding:24px;color:var(--text3);font-size:14px';em.textContent='אין נעדרים רשומים';
    wrap.appendChild(em);return;
  }
  state.missing.forEach(function(m){
    var card=document.createElement('div');
    card.style.cssText='background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:10px';
    var nameEl=document.createElement('div');nameEl.style.cssText='font-size:16px;font-weight:700;margin-bottom:4px';nameEl.textContent='🪦 '+(m.name||'ללא שם');
    var reasonEl=document.createElement('div');reasonEl.style.cssText='font-size:13px;color:var(--text2);margin-bottom:10px';reasonEl.textContent=m.reason?'סיבה: '+m.reason:'ללא סיבה רשומה';
    var btnRow=document.createElement('div');btnRow.style.cssText='display:flex;gap:8px';
    var returnBtn=document.createElement('button');
    returnBtn.style.cssText='flex:1;min-height:40px;border-radius:var(--r-sm);border:none;background:linear-gradient(135deg,#22C55E,var(--green-dark));color:#fff;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer';
    returnBtn.textContent='✅ חזר לכשירות';
    returnBtn.addEventListener('click',(function(mid){return function(){
      if(!confirm('להחזיר חייל זה לרשימת הסד"כ?'))return;
      deleteMissing(mid);
      toast('החייל הוחזר לסד"כ ✓');
      renderMissingList();
    };})(m.id));
    var delBtn=document.createElement('button');
    delBtn.style.cssText='min-height:40px;padding:0 14px;border-radius:var(--r-sm);border:1.5px solid #FECDD3;background:var(--red-bg);color:var(--red);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer';
    delBtn.textContent='🗑';
    delBtn.addEventListener('click',(function(mid){return function(){
      if(!confirm('למחוק נעדר זה לצמיתות?'))return;
      deleteMissing(mid);
      toast('הנעדר הוסר ✓');
      renderMissingList();
    };})(m.id));
    btnRow.appendChild(returnBtn);btnRow.appendChild(delBtn);
    card.appendChild(nameEl);card.appendChild(reasonEl);card.appendChild(btnRow);
    wrap.appendChild(card);
  });
}

/* ── INIT ── */
function init(){
  document.getElementById('fab').addEventListener('click',function(){
    try{var s=mkSoldier();state.soldiers.push(s);saveSoldier(s);showDetailNewSoldier(s.id);}
    catch(e){toast('שגיאה: '+e.message);}
  });
  document.getElementById('btn-back').addEventListener('click',function(){
    var s=find(state.active);
    if(s&&!s.name.trim()){
      state.soldiers=state.soldiers.filter(function(x){return x.id!==state.active;});
      deleteSoldierRemote(state.active);
      showMain();
      return;
    }
    // if on info tab, go back to leaves tab
    var infoPanel=document.getElementById('tab-info');
    if(infoPanel.classList.contains('active')){
      document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab==='leaves');});
      document.getElementById('tab-leaves').classList.add('active');
      document.getElementById('tab-info').classList.remove('active');
    } else {
      showMain();
    }
  });
  document.getElementById('btn-del').addEventListener('click',function(){
    if(!state.active)return;
    deleteSoldierRemote(state.active);
    state.soldiers=state.soldiers.filter(function(s){return s.id!==state.active;});
    toast('החייל הוסר ✓');showMain();
  });
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var t=btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab===t);});
      document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.toggle('active',p.id==='tab-'+t);});
    });
  });
  document.getElementById('sb-ms').addEventListener('click',function(){openMissingModal();});
  document.getElementById('modal-missing-close').addEventListener('click',closeMissingModal);
  document.getElementById('modal-missing').addEventListener('click',function(e){if(e.target===this)closeMissingModal();});
  document.getElementById('btn-add-missing').addEventListener('click',function(){
    document.getElementById('missing-add-form').style.display='block';
    document.getElementById('mf-name').focus();
  });
  document.getElementById('mf-cancel').addEventListener('click',function(){
    document.getElementById('missing-add-form').style.display='none';
  });
  document.getElementById('mf-save').addEventListener('click',function(){
    var name=document.getElementById('mf-name').value.trim();
    var reason=document.getElementById('mf-reason').value.trim();
    if(!name){toast('יש להזין שם');return;}
    var m={id:state.nmid++,name:name,reason:reason};
    saveMissing(m);
    document.getElementById('missing-add-form').style.display='none';
    document.getElementById('mf-name').value='';
    document.getElementById('mf-reason').value='';
    toast('הנעדר נוסף ✓');
  });
  document.getElementById('sb-all').addEventListener('click',function(){setFilter('all');});
  document.getElementById('sb-pr').addEventListener('click',function(){setFilter(state.filter==='present'?'all':'present');});
  document.getElementById('sb-ab').addEventListener('click',function(){setFilter(state.filter==='absent'?'all':'absent');});
  document.getElementById('fb-close').addEventListener('click',function(){setFilter('all');});
  document.getElementById('btn-report').addEventListener('click',openReportModal);
  document.getElementById('modal-close').addEventListener('click',closeReportModal);
  document.getElementById('modal-report').addEventListener('click',function(e){if(e.target===this)closeReportModal();});
  document.getElementById('rcal-prev').addEventListener('click',function(){rcalMonth--;if(rcalMonth<0){rcalMonth=11;rcalYear--;}renderRcal();});
  document.getElementById('rcal-next').addEventListener('click',function(){rcalMonth++;if(rcalMonth>11){rcalMonth=0;rcalYear++;}renderRcal();});
}
init();startSync();
})();
</script>
</body>
</html>
