<script>
(function(){
  var firebaseConfig = {
    apiKey: "AIzaSyDnNEMrqQyi4Al38APHL2QSZh5Cdx5EF9U",
    authDomain: "class-1-9b07a.firebaseapp.com",
    projectId: "class-1-9b07a",
    storageBucket: "class-1-9b07a.firebasestorage.app",
    messagingSenderId: "176761569042",
    appId: "1:176761569042:web:591b8e01dbdc2e78627dcb"
  };

  try {
    var app = firebase.initializeApp(firebaseConfig);
    var db = firebase.firestore();
    // iOS Safari חוסם WebSockets — long polling פותר את זה
    db.settings({ experimentalForceLongPolling: true, merge: true });

    window._db = db;
    window._collection = function(db, path){ return db.collection(path); };
    window._soldiersCol = db.collection("soldiers");
    window._missionsCol = db.collection("missions");
    window._setDoc = function(ref, data){ return ref.set(data); };
    window._deleteDoc = function(ref){ return ref.delete(); };
    window._doc = function(col, id){
      if(col && typeof col.doc === 'function') return col.doc(String(id));
      return db.collection(String(col)).doc(String(id));
    };
    window._onSnapshot = function(col, cb, errCb){
      return col.onSnapshot(function(snapshot){
        var fakeSnap = {
          forEach: function(fn){
            snapshot.docs.forEach(function(d){
              fn({ data: function(){ return d.data(); }, id: d.id });
            });
          }
        };
        cb(fakeSnap);
      }, errCb || function(err){ console.error('Firestore error:', err); });
    };

    window._firebaseReady = true;
    window.dispatchEvent(new Event('firebaseReady'));
  } catch(e) {
    console.error('Firebase init error:', e);
    setTimeout(function(){
      var lo = document.getElementById('loading-overlay');
      if(lo) lo.style.display = 'none';
      if(typeof showMain === 'function') showMain();
    }, 500);
  }
})();
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F0F2F5;--card:#FFFFFF;--card2:#F8F9FB;--border:#E2E6ED;
  --text:#1A1D23;--text2:#5A6070;--text3:#9BA3B2;
  --green:#1CB86A;--green-bg:#E8FAF1;--green-dark:#0F9454;
  --red:#E8354A;--red-bg:#FDEAEC;
  --amber:#F59E0B;--amber-bg:#FEF3C7;
  --blue:#2563EB;--blue-bg:#EFF6FF;
  --r:14px;--r-sm:10px;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --font:'Rubik',sans-serif;--hh:56px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);direction:rtl;font-size:16px;line-height:1.5;overscroll-behavior:none}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;will-change:transform}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.slide-left{transform:translateX(-38%);opacity:0;pointer-events:none}
.app-header{background:var(--card);border-bottom:1.5px solid var(--border);padding:0 16px;height:var(--hh);display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
.logo-icon{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,#1E40AF,#3B82F6);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 4px 12px rgba(37,99,235,.35)}
.title-wrap{flex:1;min-width:0}
.title-wrap h1{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.title-wrap .sub{font-size:12px;color:var(--text3)}
.dashboard{background:var(--card);border-bottom:1.5px solid var(--border);padding:8px 12px;flex-shrink:0}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:7px}
.stat-box{border-radius:var(--r-sm);padding:5px 4px;text-align:center;border:1.5px solid transparent;cursor:pointer;transition:transform .12s,box-shadow .12s;user-select:none;overflow:hidden}
.stat-box:active{transform:scale(.94)}
.stat-box.s-blue{background:var(--blue-bg);border-color:#BFDBFE}
.stat-box.s-green{background:var(--green-bg);border-color:#A7F3D0}
.stat-box.s-red{background:var(--red-bg);border-color:#FECDD3}
.stat-box.s-dark{background:#1A1D23;border-color:#374151}
.stat-box.s-dark .stat-num{color:#fff}
.stat-box.s-dark .stat-lbl{color:#9BA3B2}
.stat-box.active-filter{box-shadow:0 0 0 3px rgba(0,0,0,.15);transform:scale(.97)}
.stat-num{font-size:26px;font-weight:900;line-height:1;margin-bottom:1px}
.s-blue .stat-num{color:var(--blue)}.s-green .stat-num{color:var(--green-dark)}.s-red .stat-num{color:var(--red)}
.stat-lbl{font-size:10px;font-weight:600;color:var(--text2)}
.role-stats{display:flex;gap:5px;flex-wrap:wrap}
.rcs{background:var(--card2);border:1.5px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}
.rcs-cnt{background:var(--green);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}
.filter-banner{display:none;align-items:center;justify-content:space-between;padding:8px 16px;font-size:13px;font-weight:700;flex-shrink:0}
.filter-banner.show{display:flex}
.filter-banner.fb-green{background:#D1FAE5;color:var(--green-dark)}
.filter-banner.fb-red{background:#FEE2E2;color:var(--red)}
.fb-close{background:none;border:none;cursor:pointer;font-size:18px;color:inherit}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.list-pad{padding:14px 14px 100px}
.soldier-item{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:7px;cursor:pointer;transition:box-shadow .15s,transform .1s;min-height:62px;box-shadow:var(--shadow);user-select:none}
.soldier-item:active{transform:scale(.983);box-shadow:none}
.s-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.s-avatar.av-p{background:linear-gradient(135deg,#34D399,var(--green-dark))}
.s-avatar.av-a{background:linear-gradient(135deg,#F87171,var(--red))}
.s-info{flex:1;min-width:0}
.s-name{font-size:14px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-roles{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0}

.empty{text-align:center;padding:64px 24px;color:var(--text3)}

.fab{position:fixed;bottom:calc(86px + env(safe-area-inset-bottom));left:18px;width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#1E40AF,#3B82F6);color:#fff;font-size:28px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 24px rgba(37,99,235,.45);transition:transform .15s;z-index:30}
.fab:active{transform:scale(.88)}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1.5px solid var(--border);padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom));z-index:20;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.btn-report{width:100%;min-height:52px;border-radius:var(--r-sm);border:none;background:linear-gradient(135deg,#1E40AF,#3B82F6);color:#fff;font-family:var(--font);font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 16px rgba(37,99,235,.35);transition:transform .12s}
.btn-report:active{transform:scale(.97)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:50px;padding:0 20px;border-radius:var(--r-sm);border:none;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn:active{transform:scale(.96)}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1.5px solid #FECDD3}
.btn-waze{background:#1CCAD8;color:#fff}
.btn-maps{background:#EA4335;color:#fff}
.btn-call{background:linear-gradient(135deg,#22C55E,var(--green-dark));color:#fff;font-size:16px;min-height:50px;border-radius:var(--r-sm);box-shadow:0 4px 16px rgba(28,184,106,.4)}
.btn-full{width:100%}
.btn-wa{background:#25D366;color:#fff;flex:1}
.btn-xl{background:#1D6F42;color:#fff;flex:1}
.btn-edit{background:var(--blue-bg);color:var(--blue);border:1.5px solid #BFDBFE;min-height:38px;padding:0 14px;font-size:13px;border-radius:20px}
.detail-header{background:var(--card);border-bottom:1.5px solid var(--border);padding:0 14px;height:var(--hh);display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-btn{width:46px;height:46px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--text2);flex-shrink:0;transition:background .15s}
.back-btn:active{background:var(--bg)}
.detail-title{flex:1;font-size:18px;font-weight:800;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tabs-bar{display:flex;background:var(--card);border-bottom:1.5px solid var(--border);flex-shrink:0}
.tab-btn{flex:1;min-height:48px;border:none;background:transparent;font-family:var(--font);font-size:15px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;transition:all .18s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab-panel.active{display:block}
.tab-inner{padding:16px 14px 80px}
.field-view{background:var(--bg);border-radius:var(--r-sm);padding:13px 14px;margin-bottom:10px;border:1.5px solid var(--border)}
.field-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.field-val{font-size:15px;font-weight:600;color:var(--text);min-height:22px}
.field-val.empty-val{color:var(--text3);font-weight:400;font-style:italic}
.status-pill{display:inline-flex;align-items:center;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:700;border:1.5px solid}
.sp-present{background:var(--green-bg);border-color:var(--green);color:var(--green-dark)}
.sp-absent{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.sp-leave{background:var(--amber-bg);border-color:#FCD34D;color:#92400E}
.roles-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.role-pill{background:var(--blue-bg);color:var(--blue);border:1.5px solid #BFDBFE;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600}
.edit-section{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.edit-sec-hdr{padding:14px 18px 0;font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px}
.edit-sec-body{padding:14px 18px 18px}
.flbl{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:7px;display:block}
.finp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:13px 14px;color:var(--text);font-family:var(--font);font-size:15px;direction:rtl;outline:none;transition:border-color .15s;min-height:50px}
.finp:focus{border-color:var(--blue);background:#fff}
.finp::placeholder{color:var(--text3)}
textarea.finp{resize:vertical;min-height:80px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:9px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);color:var(--text2);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;min-height:42px;display:flex;align-items:center}
.chip.sel{background:#EFF6FF;border-color:var(--blue);color:var(--blue)}
.lv-rec{background:var(--card);border-radius:var(--r-sm);border:1.5px solid var(--border);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.lv-info{flex:1}.lv-dates{font-size:14px;font-weight:700}.lv-days{font-size:12px;color:var(--text3);margin-top:2px}
.lv-del{width:36px;height:36px;border-radius:9px;border:1.5px solid #FECDD3;background:var(--red-bg);color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lv-del:active{background:var(--red);color:#fff}
.lv-form{background:var(--bg);border-radius:var(--r-sm);border:1.5px dashed var(--border);padding:14px;margin-top:8px;display:none}
.lv-form.open{display:block}
.lv-total-box{background:var(--amber-bg);border:1.5px solid #FCD34D;border-radius:var(--r-sm);padding:11px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.cal-wrap{background:var(--card);border-radius:var(--r-sm);overflow:hidden}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px}
.cal-nav-btn{font-size:22px;background:none;border:none;cursor:pointer;color:var(--text2);padding:0 6px}
.cal-month-lbl{font-size:15px;font-weight:700}
.cal-hint{text-align:center;font-size:12px;color:var(--text3);padding:0 0 6px;min-height:18px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:4px 10px 12px}
.cal-day-hdr{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:4px 0}
.cal-day{background:transparent;border:none;border-radius:8px;cursor:pointer;padding:7px 2px;font-size:14px;font-family:var(--font);text-align:center;transition:background .12s;color:var(--text);font-weight:500}
.cal-day.from,.cal-day.to{background:var(--green);color:#fff;font-weight:800;border-radius:50%}
.cal-day.in-range{background:var(--green-bg);color:var(--green-dark);font-weight:600}
.cal-day.disabled{color:var(--text3);cursor:default}
.cal-day.pending-from,.cal-day.pending-to{background:var(--amber-bg);color:#92400E;font-weight:800;border-radius:50%}
.cal-day.pending-range{background:#FEF3C7;color:#92400E;font-weight:600}
.nl-box{border-radius:var(--r-sm);padding:16px;border:2px solid var(--border);background:var(--card2);transition:all .25s}
.nl-box.approved{background:var(--green-bg);border-color:#86EFAC}
.nl-box.pending{background:var(--blue-bg);border-color:var(--blue)}
.ap-row{display:flex;align-items:center;gap:12px;margin-top:14px}
.ap-chk{width:26px;height:26px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.ap-lbl{font-size:15px;font-weight:600;cursor:pointer}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:24px 20px 36px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}

.modal-drag{width:40px;height:5px;background:var(--border);border-radius:3px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:18px;text-align:center}
.rcal-wrap{background:var(--bg);border-radius:var(--r-sm);padding:10px;margin-bottom:18px}

.rcal-nav-btn{font-size:22px;background:none;border:none;cursor:pointer;color:var(--text2);padding:0 8px}
.rcal-month-lbl{font-size:15px;font-weight:700}
.rcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.rcal-hdr{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:4px 0}
.rcal-day{background:transparent;border:none;border-radius:8px;cursor:pointer;padding:8px 2px;font-size:14px;font-family:var(--font);text-align:center;transition:background .12s;color:var(--text);font-weight:500;width:100%}
.rcal-day:hover{background:var(--blue-bg)}
.rcal-day.selected{background:var(--blue);color:#fff;font-weight:800;border-radius:50%}
.rcal-day.today-mark{font-weight:900;color:#fff;background:var(--blue);border-radius:50%}
.week-section{padding:10px 16px 12px}
.report-result{background:var(--green-bg);border:1.5px solid #A7F3D0;border-radius:var(--r-sm);padding:14px 16px;margin-bottom:14px;display:none}
.report-result.show{display:block}
.rr-date{font-size:13px;color:var(--text3);margin-bottom:6px}
.rr-names{font-size:14px;font-weight:600;line-height:1.8;white-space:pre-line}
.rr-count{font-size:13px;color:var(--green-dark);font-weight:700;margin-top:6px}
.share-row{display:flex;gap:10px;margin-top:10px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(16px);background:#1A1D23;color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.main-tab-btn.active{color:var(--blue)!important;border-bottom-color:var(--blue)!important}

body.dark-mode .dashboard{background:linear-gradient(180deg,#1A2240,#161D2F)}
body.dark-mode .bottom-bar{background:linear-gradient(180deg,#161D2F,#0F1320)}
body.dark-mode .s-avatar.av-p{background:linear-gradient(135deg,#00E890,#007A50)}
body.dark-mode .s-avatar.av-a{background:linear-gradient(135deg,#FF7090,#CC1A35)}
body.dark-mode .s-badge.bp{background:rgba(0,194,122,.12);color:#00E890;border-color:rgba(0,194,122,.25)}
body.dark-mode .s-badge.ba{background:rgba(255,77,106,.12);color:#FF7090;border-color:rgba(255,77,106,.25)}
body.dark-mode .sp-present{background:rgba(0,194,122,.12);border-color:rgba(0,194,122,.3);color:#00E890}
body.dark-mode .sp-absent{background:rgba(255,77,106,.12);border-color:rgba(255,77,106,.3);color:#FF7090}
body.dark-mode .sp-leave{background:rgba(255,181,71,.12);border-color:rgba(255,181,71,.3);color:#FFB547}
body.dark-mode .filter-banner.fb-green{background:rgba(0,194,122,.15);color:#00E890}
body.dark-mode .filter-banner.fb-red{background:rgba(255,77,106,.15);color:#FF7090}
body.dark-mode .finp{background:#1E2535;color:#F0F2F5;border-color:#2E3650}
body.dark-mode .finp:focus{border-color:#4D9FFF;background:#252D42}
body.dark-mode .finp::placeholder{color:#6B7590}
body.dark-mode .chip.sel{background:rgba(77,159,255,.15);border-color:#4D9FFF;color:#7DB8FF}
body.dark-mode .tab-btn.active{color:#7DB8FF;border-bottom-color:#4D9FFF}
body.dark-mode .loading-overlay-bg{background:#0F1320!important}
.week-day-card{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.week-day-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card2);border-bottom:1.5px solid var(--border)}
.week-day-name{font-size:15px;font-weight:800;color:var(--text)}
.week-day-date{font-size:12px;color:var(--text3);font-weight:600}
.week-day-today{background:var(--blue)!important}
.week-day-today .week-day-name,.week-day-today .week-day-date{color:#fff!important;font-weight:900}
.cal-day.cal-today{font-weight:900;color:#fff!important;background:var(--blue)!important;border-radius:50%}
body.dark-mode .btn-ghost{background:#2A3450;color:#A0B4E8;border-color:#3D4F70}
body.dark-mode .btn-ghost:active{background:#3D4F70}
.week-section-lbl{font-size:18px;font-weight:900;letter-spacing:.3px;margin-bottom:8px}
.week-person{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.week-person:last-child{border-bottom:none}
.week-person-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.week-person-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.week-empty{font-size:13px;color:var(--text3);font-style:italic;padding:4px 0}
.week-toggle{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;color:var(--text3);font-size:13px;font-weight:600;border-top:1.5px solid var(--border);justify-content:center}
.week-toggle:active{background:var(--bg)}
</style>
</head>

<script>
(function(){
var ROLES=['חובש','מאג','מטול','קלע','מ"כ','סמ"ל','מפקד מחלקה','רוגר','צלף','מטאדור','נהג נגמ"ש','נגב'];
var KEY=[0,4,6];
var MONTHS_HE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
var DAYS_HE=['א','ב','ג','ד','ה','ו','ש'];

var state={soldiers:[],missing:[],nid:1,nmid:1,active:null,filter:'all'};

function saveSoldier(s){
  if(!window._firebaseReady)return;
  var docRef=window._doc(window._soldiersCol,String(s.id));
  window._setDoc(docRef, JSON.parse(JSON.stringify(s)));
}
function deleteSoldierRemote(id){
  if(!window._firebaseReady)return;
  var docRef=window._doc(window._soldiersCol,String(id));
  window._deleteDoc(docRef);
}
function startSync(){
  if(!window._firebaseReady){
    window.addEventListener('firebaseReady',startSync,{once:true});
    // אם Firebase לא מוכן תוך 8 שניות (Safari/iOS) — פתח בכל זאת
    setTimeout(function(){
      if(!window._firebaseReady){
        var lo=document.getElementById('loading-overlay');
        if(lo){lo.style.display='none';}
        showMain();
        toast('⚠️ לא ניתן להתחבר לשרת');
      }
    },8000);
    return;
  }
  window._onSnapshot(window._soldiersCol, function(snapshot){
    var incoming=[];
    snapshot.forEach(function(d){incoming.push(d.data());});
    var maxId=0;
    incoming.forEach(function(s){if(s.id>maxId)maxId=s.id;});
    if(maxId>=state.nid)state.nid=maxId+1;
    // תקן חיילים שמסומנים כנעדרים אך אינם ברשימת הנעדרים (מצב לא תקין)
    incoming.forEach(function(s){
      if(s.isMissing){
        var stillMissing=state.missing.some(function(m){return m.id===s._missingId;});
        if(!stillMissing){s.isMissing=false;s._missingId=null;}
      }
    });
    state.soldiers=incoming;
    checkAllExpiries(); // בדוק יציאות שפגו
    if(document.getElementById('scr-main')&&!document.getElementById('scr-main').classList.contains('hidden')){
      renderMain();
    }
    var lo=document.getElementById('loading-overlay');
    if(lo)lo.style.display='none';
  });
  var missingCol=window._collection(window._db,'missing');
  window._onSnapshot(missingCol, function(snapshot){
    var inc=[];snapshot.forEach(function(d){inc.push(d.data());});
    var mx=0;inc.forEach(function(m){if(m.id>mx)mx=m.id;});
    if(mx>=state.nmid)state.nmid=mx+1;
    state.missing=inc;
    document.getElementById('st-ms').textContent=state.missing.length;
  });
  listenMissions();
}
function mkSoldier(){return{id:state.nid++,name:'',firstName:'',lastName:'',personalId:'',photoData:'',status:'present',roles:[],phone:'',residence:'',leaves:[],nextFrom:'',nextTo:'',nextApproved:false,notes:'',hasWife:false,wifeName:'',wifePhone:'',hasKids:false,kids:[],nextNotes:''};}
function find(id){return state.soldiers.find(function(s){return s.id===id;});}
function initials(n){var p=(n||'').trim().split(/\s+/).filter(Boolean);if(!p.length)return'?';if(p.length===1)return p[0].slice(0,2);return p[0][0]+(p[p.length-1][0]||'');}
function calcDays(a,b){if(!a||!b)return 0;var d=(new Date(b)-new Date(a))/864e5;return d>0?Math.round(d):0;}

// עטוף textarea עם כפתור undo
function wrapWithUndo(ta){
  var wrap=document.createElement('div');wrap.style.cssText='position:relative';
  ta.parentNode&&ta.parentNode.insertBefore(wrap,ta);
  wrap.appendChild(ta);
  var history=[''];var pos=0;
  ta.addEventListener('input',function(){
    history.splice(pos+1);
    history.push(ta.value);
    pos=history.length-1;
    btn.style.opacity=pos>0?'1':'0.3';
  });
  var btn=document.createElement('button');
  btn.type='button';
  btn.textContent='↩';
  btn.title='בטל שינוי';
  btn.style.cssText='position:absolute;top:6px;left:6px;width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border);background:var(--card2);color:var(--text2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0.3;transition:opacity .15s;z-index:2;padding:0';
  btn.addEventListener('click',function(e){
    e.preventDefault();
    if(pos>0){pos--;ta.value=history[pos];ta.dispatchEvent(new Event('input'));btn.style.opacity=pos>0?'1':'0.3';}
  });
  wrap.appendChild(btn);
  ta.style.paddingLeft='40px';
  return wrap;
}
function toDateStr(y,m,d){return y+'-'+(m<9?'0':'')+(m+1)+'-'+(d<10?'0':'')+d;}
function today(){var n=new Date();return toDateStr(n.getFullYear(),n.getMonth(),n.getDate());}
function tomorrowStr(){var n=new Date();n.setDate(n.getDate()+1);return toDateStr(n.getFullYear(),n.getMonth(),n.getDate());}
function fmtDate(s){if(!s)return'';var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fmtDateHe(s){if(!s)return'';var p=s.split('-');return p[2]+' ב'+MONTHS_HE[+p[1]-1]+' '+p[0];}

function checkNextExpiry(s){
  if(s.nextApproved&&s.nextFrom&&s.nextTo&&s.nextTo<today()){
    s.leaves.push({from:s.nextFrom,to:s.nextTo});
    s.nextFrom='';s.nextTo='';s.nextApproved=false;
    saveSoldier(s);
  }
}
function checkAllExpiries(){
  var changed=false;
  state.soldiers.forEach(function(s){
    if(s.nextApproved&&s.nextFrom&&s.nextTo&&s.nextTo<today()){
      s.leaves.push({from:s.nextFrom,to:s.nextTo});
      s.nextFrom='';s.nextTo='';s.nextApproved=false;
      saveSoldier(s);
      changed=true;
    }
  });
  if(changed)renderMain();
}
function scheduleMidnightCheck(){
  var now=new Date();
  var midnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,5);
  var msUntilMidnight=midnight-now;
  setTimeout(function(){
    checkAllExpiries();
    scheduleMidnightCheck(); // תזמן לחצות הבאה
  },msUntilMidnight);
}
function getStatusInfo(s){
  var td=today();
  for(var i=0;i<s.leaves.length;i++){if(td>=s.leaves[i].from&&td<s.leaves[i].to)return{label:'🏖️ בחופשה',cls:'sp-leave'};}
  if(s.nextApproved&&s.nextFrom&&s.nextTo&&td>=s.nextFrom&&td<s.nextTo)return{label:'🏖️ בחופשה',cls:'sp-leave'};
  if(s.status==='present')return{label:'✅ נוכח',cls:'sp-present'};
  return{label:'❌ חסר',cls:'sp-absent'};
}
function presentOnDate(s,ds){
  if(s.status!=='present')return false;
  for(var i=0;i<s.leaves.length;i++){if(ds>=s.leaves[i].from&&ds<s.leaves[i].to)return false;}
  if(s.nextApproved&&s.nextFrom&&s.nextTo&&ds>=s.nextFrom&&ds<s.nextTo)return false;
  return true;
}

var _tt=null;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},2500);}

function setFilter(f){
  // עבור לטאב חיילים אם בלוח שבועי
  var weekTab=document.getElementById('main-tab-week');
  if(weekTab&&weekTab.style.display!=='none'){
    document.querySelectorAll('.main-tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.mtab==='list');});
    document.getElementById('main-tab-list').style.display='';
    weekTab.style.display='none';
    document.getElementById('fab').style.display='';
  }
  state.filter=f;
  var banner=document.getElementById('filter-banner');
  document.getElementById('sb-all').classList.toggle('active-filter',f==='all');
  document.getElementById('sb-pr').classList.toggle('active-filter',f==='present');
  document.getElementById('sb-ab').classList.toggle('active-filter',f==='absent');
  document.getElementById('sb-ms').classList.toggle('active-filter',f==='missing');
  if(f==='present'){banner.className='filter-banner show fb-green';document.getElementById('fb-label').textContent='מציג נוכחים בלבד';}
  else if(f==='absent'){banner.className='filter-banner show fb-red';document.getElementById('fb-label').textContent='מציג בחופשה בלבד';}
  else{banner.className='filter-banner';}
  renderList();
}

function showMain(){
  document.getElementById('scr-det').classList.add('hidden');
  document.getElementById('scr-det').classList.remove('slide-left');
  document.getElementById('scr-main').classList.remove('hidden','slide-left');
  renderMain();
}
function showDetail(id){
  state.active=id;
  document.getElementById('scr-main').classList.add('slide-left');
  document.getElementById('scr-det').classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab==='leaves');});
  document.getElementById('tab-leaves').classList.add('active');
  document.getElementById('tab-info').classList.remove('active');
  document.querySelector('.tabs-bar').style.display='flex';
  renderDetail(id);
}
function showDetailNewSoldier(id){
  try{
    state.active=id;
    document.getElementById('scr-main').classList.add('slide-left');
    document.getElementById('scr-det').classList.remove('hidden');
    var s=state.soldiers.find(function(x){return x.id===id;});
    if(s&&s.isMissing){
      document.querySelector('.tabs-bar').style.display='none';
      document.getElementById('tab-info').classList.add('active');
      document.getElementById('tab-leaves').classList.remove('active');
    } else {
      document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab==='info');});
      document.getElementById('tab-info').classList.add('active');
      document.getElementById('tab-leaves').classList.remove('active');
    }
    renderDetail(id);
  }catch(e){
    document.getElementById('scr-main').classList.remove('slide-left');
    document.getElementById('scr-det').classList.add('hidden');
    toast('שגיאה בפתיחת כרטיס: '+e.message);
  }
}
function renderMain(){
  try{updateStats();renderList();renderWeek();}
  catch(e){console.error('renderMain error:',e);}
}

function renderWeek(){
  var wrap=document.getElementById('week-wrap');
  if(!wrap)return;
  wrap.innerHTML='';

  // כפתור הסרת לוח שבועי
  var toggleBtn=document.createElement('div');
  toggleBtn.className='week-toggle';
  toggleBtn.innerHTML='⚙️ הסר לוח שבועי';
  toggleBtn.addEventListener('click',function(){
    if(confirm('להסיר את הלוח השבועי?')){
      document.getElementById('main-tabs-bar').style.display='none';
      document.getElementById('main-tab-week').style.display='none';
      document.getElementById('main-tab-list').style.display='';
      toast('הלוח הוסר. ניתן להחזיר דרך ⚙️');
    }
  });

  var today=new Date();
  var DAY_NAMES=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

  for(var i=0;i<7;i++){
    var d=new Date(today);
    d.setDate(today.getDate()+i);
    var ds=toDateStr(d.getFullYear(),d.getMonth(),d.getDate());
    var isToday=i===0;
    var dayName='יום '+DAY_NAMES[d.getDay()];
    var dateStr=d.getDate()+'/'+(d.getMonth()+1);

    // מי יוצא היום (nextFrom === ds ומאושר, או leaves שמתחיל היום)
    var leaving=state.soldiers.filter(function(s){
      if(s.isMissing)return false;
      if(s.nextApproved&&s.nextFrom===ds)return true;
      if(s.leaves&&s.leaves.some(function(l){return l.from===ds;}))return true;
      return false;
    });

    // מי חוזר היום (nextTo === ds ומאושר, או leaves שמסתיים היום)
    var returning=state.soldiers.filter(function(s){
      if(s.isMissing)return false;
      if(s.nextApproved&&s.nextTo===ds)return true;
      if(s.leaves&&s.leaves.some(function(l){return l.to===ds;}))return true;
      return false;
    });

    if(leaving.length===0&&returning.length===0&&!isToday)continue;

    var card=document.createElement('div');
    card.className='week-day-card';

    var hdr=document.createElement('div');
    hdr.className='week-day-hdr'+(isToday?' week-day-today':'');
    hdr.innerHTML='<span class="week-day-name">'+dayName+(isToday?' — היום':'')+'</span><span class="week-day-date">'+dateStr+'</span>';
    card.appendChild(hdr);

    function mkSection(title,color,people){
      var sec=document.createElement('div');
      sec.className='week-section';
      var lbl=document.createElement('div');
      lbl.className='week-section-lbl';
      lbl.style.color=color;
      lbl.textContent=title;
      sec.appendChild(lbl);
      if(!people.length){
        var emp=document.createElement('div');emp.className='week-empty';emp.textContent='אין';sec.appendChild(emp);
      } else {
        people.forEach(function(s){
          var row=document.createElement('div');row.className='week-person';
          var av=document.createElement('div');av.className='week-person-av';
          av.style.background=getStatusInfo(s).cls==='sp-present'?'linear-gradient(135deg,#34D399,#0F9454)':'linear-gradient(135deg,#F87171,#E8354A)';
          if(s.photoData){var img=document.createElement('img');img.src=s.photoData;img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';av.appendChild(img);}
          else{av.textContent=initials(s.name||'?');}
          var nm=document.createElement('div');nm.className='week-person-name';nm.textContent=s.name||'חייל';
          row.appendChild(av);row.appendChild(nm);
          row.style.cursor='pointer';
          row.addEventListener('click',function(){showDetail(s.id);});
          sec.appendChild(row);
        });
      }
      return sec;
    }

    card.appendChild(mkSection('✈️ יוצאים','#F59E0B',leaving));
    card.appendChild(mkSection('🏠 חוזרים','#1CB86A',returning));
    wrap.appendChild(card);
  }

  if(wrap.children.length===0){
    var em=document.createElement('div');
    em.className='empty';
    em.innerHTML='<div class="ei">📅</div><h3>אין תנועות השבוע</h3><p>לא נמצאו יציאות או חזרות בשבעת הימים הקרובים</p>';
    wrap.appendChild(em);
  }
  wrap.appendChild(toggleBtn);
}

/* ═══ LEAVES TAB ═══ */
function buildLeavesTab(s){
  var panel=document.getElementById('tab-leaves');
  panel.innerHTML='';
  var inner=document.createElement('div');inner.className='tab-inner';

  var totBox=document.createElement('div');totBox.className='lv-total-box';
  var totLbl=document.createElement('span');totLbl.style.cssText='font-size:13px;font-weight:600;color:#92400E';totLbl.textContent='סה"כ ימי יציאה:';
  var totNum=document.createElement('span');totNum.style.cssText='font-size:24px;font-weight:900;color:#B45309';
  totBox.appendChild(totLbl);totBox.appendChild(totNum);

  var lvList=document.createElement('div');
  var nextTotEl=null;

  function calcTotal(){
    var t=0;s.leaves.forEach(function(lv){t+=calcDays(lv.from,lv.to);});return t;
  }
  function renderLv(){
    lvList.innerHTML='';
    totNum.textContent=calcTotal()+' ימים';
    var sorted=s.leaves.slice().sort(function(a,b){return a.from<b.from?-1:a.from>b.from?1:0;});
    if(!sorted.length){
      var empty=document.createElement('div');empty.style.cssText='color:var(--text3);font-size:14px;padding:8px 0;text-align:center';empty.textContent='אין יציאות רשומות';
      lvList.appendChild(empty);
    } else {
      sorted.forEach(function(lv){
        var li=s.leaves.indexOf(lv);
        var rec=document.createElement('div');rec.className='lv-rec';
        var inf=document.createElement('div');inf.className='lv-info';
        inf.innerHTML='<div class="lv-dates">'+fmtDate(lv.to)+' ← '+fmtDate(lv.from)+'</div><div class="lv-days">'+calcDays(lv.from,lv.to)+' ימים</div>';
        var del=document.createElement('button');del.className='lv-del';del.textContent='×';
        del.addEventListener('click',(function(i,lv){return function(){
          if(!confirm('למחוק את היציאה '+fmtDate(lv.from)+' → '+fmtDate(lv.to)+'?'))return;
          s.leaves.splice(i,1);saveSoldier(s);renderLv();
        };})(li,lv));
        rec.appendChild(inf);rec.appendChild(del);lvList.appendChild(rec);
      });
    }
    if(nextTotEl){
      var nd=s.nextApproved&&s.nextFrom&&s.nextTo?calcDays(s.nextFrom,s.nextTo):0;
      nextTotEl.textContent=nd>0?'✅ אושר — '+nd+' ימים (יתווספו ליציאות)':(s.nextFrom&&s.nextTo?calcDays(s.nextFrom,s.nextTo)+' ימים':'');
    }
  }

  var addBtn=document.createElement('button');addBtn.className='btn btn-ghost btn-full';addBtn.textContent='+ הוסף יציאה';addBtn.style.marginTop='8px';
  var addForm=document.createElement('div');addForm.className='lv-form';
  var calObj=buildCal(s,'leave',function(from,to){
    s.leaves.push({from:from,to:to});
    s.leaves.sort(function(a,b){return a.from<b.from?-1:a.from>b.from?1:0;});
    saveSoldier(s);renderLv();addForm.classList.remove('open');
  });
  calObj.cancel.addEventListener('click',function(){addForm.classList.remove('open');});
  addForm.appendChild(calObj.el);
  addBtn.addEventListener('click',function(){var o=addForm.classList.contains('open');addForm.classList.toggle('open');if(!o)calObj.reset();});

  inner.appendChild(totBox);inner.appendChild(lvList);inner.appendChild(addBtn);inner.appendChild(addForm);

  var nlSec=document.createElement('div');nlSec.className='edit-section';nlSec.style.marginTop='18px';
  var nlHdr=document.createElement('div');nlHdr.className='edit-sec-hdr';nlHdr.textContent='בקשת יציאה הבאה';
  var nlBody=document.createElement('div');nlBody.className='edit-sec-body';
  function nlBoxClass(){return 'nl-box'+(s.nextApproved?' approved':(s.nextFrom&&s.nextTo?' pending':''));}
  var nlBox=document.createElement('div');nlBox.className=nlBoxClass();

  var nlDatesLbl=document.createElement('div');nlDatesLbl.style.cssText='font-size:20px;font-weight:800;color:var(--text);margin-bottom:10px;text-align:center;letter-spacing:.5px';
  nextTotEl=document.createElement('div');nextTotEl.style.cssText='font-size:12px;color:#0F9454;font-weight:600;margin-bottom:10px';

  function fmtShort(ds){if(!ds)return'';var p=ds.split('-');return p[2]+'/'+p[1];}
  function updNlLbl(){
    if(s.nextFrom&&s.nextTo){
      nlDatesLbl.innerHTML='<div style="display:flex;align-items:center;justify-content:center;gap:12px"><span style="font-size:26px;font-weight:900">'+fmtShort(s.nextFrom)+'</span><span style="font-size:18px;color:var(--text3)">←</span><span style="font-size:26px;font-weight:900">'+fmtShort(s.nextTo)+'</span></div>';
    } else {
      nlDatesLbl.textContent='לא נבחר תאריך';
    }
    var nd=s.nextApproved&&s.nextFrom&&s.nextTo?calcDays(s.nextFrom,s.nextTo):0;
    nextTotEl.textContent=nd>0?'✅ אושר — '+nd+' ימים (יתווספו ליציאות)':(s.nextFrom&&s.nextTo?calcDays(s.nextFrom,s.nextTo)+' ימים':'');
  }
  updNlLbl();

  var calTog=document.createElement('button');calTog.className='btn btn-ghost';calTog.textContent='📅 בחר תאריכים';calTog.style.cssText='flex:1;min-height:42px';
  var clrBtn=document.createElement('button');clrBtn.className='btn btn-danger';clrBtn.textContent='✕';clrBtn.style.cssText='min-height:42px;padding:0 16px';
  var calRow=document.createElement('div');calRow.style.cssText='display:flex;gap:8px;margin-bottom:8px';calRow.appendChild(calTog);calRow.appendChild(clrBtn);

  var nxForm=document.createElement('div');nxForm.className='lv-form';
  var nxCal=buildCal(s,'next',function(from,to){s.nextFrom=from;s.nextTo=to;saveSoldier(s);updNlLbl();nlBox.className=nlBoxClass();renderLv();nxForm.classList.remove('open');apRow.style.display='flex';});
  nxCal.cancel.addEventListener('click',function(){nxForm.classList.remove('open');});
  nxForm.appendChild(nxCal.el);
  calTog.addEventListener('click',function(){var o=nxForm.classList.contains('open');nxForm.classList.toggle('open');if(!o)nxCal.reset();});
  clrBtn.addEventListener('click',function(){s.nextFrom='';s.nextTo='';s.nextApproved=false;apChk.checked=false;nlBox.className='nl-box';apRow.style.display='none';saveSoldier(s);updNlLbl();renderLv();});

  var apRow=document.createElement('div');apRow.className='ap-row';
  apRow.style.display=(s.nextFrom&&s.nextTo)?'flex':'none';
  var apChk=document.createElement('input');apChk.type='checkbox';apChk.className='ap-chk';apChk.checked=!!s.nextApproved;
  var apId='apchk'+s.id;apChk.id=apId;
  var apLbl=document.createElement('label');apLbl.className='ap-lbl';apLbl.textContent='אושר יציאה';apLbl.htmlFor=apId;
  apChk.addEventListener('change',function(){
    if(apChk.checked){
      apChk.checked=false; // נחזיר אחרי אישור
      // מודל אישור מותאם
      var overlay=document.createElement('div');
      overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
      var box=document.createElement('div');
      box.style.cssText='background:#fff;border-radius:16px;padding:24px 20px;width:100%;max-width:320px;text-align:center';
      box.innerHTML='<div style="font-size:18px;font-weight:800;margin-bottom:10px">אישור יציאה</div><div style="font-size:15px;color:#5A6070;margin-bottom:20px">לאשר יציאה ל'+s.name+'?</div>';
      var btnRow=document.createElement('div');btnRow.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px';
      var cancelBtn=document.createElement('button');
      cancelBtn.style.cssText='padding:12px;border-radius:10px;border:1.5px solid #E2E6ED;background:#F8F9FB;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font)';
      cancelBtn.textContent='ביטול';
      var phone='';
      if(s.phone){phone=s.phone.replace(/\D/g,'');if(phone.startsWith('0'))phone='972'+phone.slice(1);}
      var confirmA=document.createElement('a');
      confirmA.style.cssText='padding:12px;border-radius:10px;border:none;background:#1CB86A;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);text-decoration:none;display:flex;align-items:center;justify-content:center';
      confirmA.textContent='אשר ✓';
      if(phone){confirmA.href='https://wa.me/'+phone;confirmA.target='_blank';}
      confirmA.addEventListener('click',function(){
        s.nextApproved=true;
        apChk.checked=true;
        nlBox.className=nlBoxClass();updNlLbl();renderLv();saveSoldier(s);
        document.body.removeChild(overlay);
      });
      cancelBtn.addEventListener('click',function(){document.body.removeChild(overlay);});
      btnRow.appendChild(cancelBtn);btnRow.appendChild(confirmA);
      box.appendChild(btnRow);overlay.appendChild(box);document.body.appendChild(overlay);
    } else {
      s.nextApproved=false;
      nlBox.className=nlBoxClass();updNlLbl();renderLv();saveSoldier(s);
    }
  });

/* ── CALENDAR ── */
function buildCal(s,mode,onSave){
  var wrap=document.createElement('div');
  var cw=document.createElement('div');cw.className='cal-wrap';
  var nav=document.createElement('div');nav.className='cal-nav';
  var prev=document.createElement('button');prev.className='cal-nav-btn';prev.textContent='‹';
  var nxt=document.createElement('button');nxt.className='cal-nav-btn';nxt.textContent='›';
  var lbl=document.createElement('span');lbl.className='cal-month-lbl';
  var hint=document.createElement('div');hint.className='cal-hint';
  var grid=document.createElement('div');grid.className='cal-grid';
  nav.appendChild(prev);nav.appendChild(lbl);nav.appendChild(nxt);
  cw.appendChild(nav);cw.appendChild(hint);cw.appendChild(grid);
  var cy=new Date().getFullYear(),cm=new Date().getMonth();
  var pf=mode==='next'&&s.nextFrom?s.nextFrom:null;
  var pt=mode==='next'&&s.nextTo?s.nextTo:null;
  function rc(){
    lbl.textContent=MONTHS_HE[cm]+' '+cy;
    if(!pf)hint.textContent='בחר תאריך תחילה';
    else if(!pt)hint.textContent='עכשיו בחר תאריך סיום';
    else hint.textContent=fmtDate(pf)+' → '+fmtDate(pt)+' ('+calcDays(pf,pt)+' ימים)';
    grid.innerHTML='';
    DAYS_HE.forEach(function(d){var h=document.createElement('div');h.className='cal-day-hdr';h.textContent=d;grid.appendChild(h);});
    var fd=new Date(cy,cm,1).getDay();
    for(var i=0;i<fd;i++)grid.appendChild(document.createElement('div'));
    var dim=new Date(cy,cm+1,0).getDate();
    for(var d=1;d<=dim;d++){
      var ds=toDateStr(cy,cm,d);
      var isPast=pf&&!pt&&ds<pf;
      var isBeforeToday=mode==='next'&&ds<today();
      var cls='cal-day';
      if(mode==='next'){
        if(ds===pf||ds===pt)cls+=' pending-from';
        else if(pf&&pt&&ds>pf&&ds<pt)cls+=' pending-range';
        else if(isPast||isBeforeToday)cls+=' disabled';
      } else {
        if(ds===pf||ds===pt)cls+=' from';
        else if(pf&&pt&&ds>pf&&ds<pt)cls+=' in-range';
        else if(isPast)cls+=' disabled';
      }
      var btn=document.createElement('button');btn.className=cls+(ds===today()?' cal-today':'');btn.textContent=d;
      if(!isPast&&!isBeforeToday)(function(ds2){btn.addEventListener('click',function(){
        if(!pf||pt){pf=ds2;pt=null;}
        else{if(ds2<=pf){pf=ds2;pt=null;}else{pt=ds2;onSave(pf,pt);pf=null;pt=null;}}
        rc();
      });})(ds);
      grid.appendChild(btn);
    }
  }
  prev.addEventListener('click',function(){cm--;if(cm<0){cm=11;cy--;}rc();});
  nxt.addEventListener('click',function(){cm++;if(cm>11){cm=0;cy++;}rc();});
  rc();
  var cn=document.createElement('button');cn.className='btn btn-ghost btn-full';cn.textContent='ביטול';cn.style.marginTop='8px';
  wrap.appendChild(cw);wrap.appendChild(cn);
  return{el:wrap,cancel:cn,reset:function(){pf=null;pt=null;rc();}};
}

    snap.forEach(function(d){docs.push(d.data());});

      +'</div>'
      +'<div class="mission-detail" id="mdet-'+m.id+'" style="display:none;margin-top:12px;border-top:1px solid var(--border);padding-top:12px"></div>';

    wrap.appendChild(card);

    // מחיקה
    card.querySelector('.mission-delete-btn').addEventListener('click',function(e){
      e.stopPropagation();
      if(!confirm('למחוק את יזומה "'+m.name+'"?'))return;
      _openMissionId=null;
      missionsState.missions=missionsState.missions.filter(function(x){return x.id!==m.id;});
      missionsState.missions.forEach(function(x,i){x.ironNum=i+1;saveMission(x);});
      deleteMissionRemote(m.id);
      renderMissions();
      toast('יזומה נמחקה');
    });

    // שיתוף הרכב
    card.querySelector('.mission-share-btn').addEventListener('click',function(e){
      e.stopPropagation();
      var nums=calcMissionIronNums(m);
      var lines=[];
      lines.push('🎯 יזומה: '+m.name);
      var d2=new Date(m.date);
      lines.push('📅 '+(d2.getDate()+'').padStart(2,'0')+'/'+(d2.getMonth()+1+'').padStart(2,'0')+'/'+d2.getFullYear());
      lines.push(nums['cmd']+'. מפקד המשימה: '+(m.commander||'ריק'));
      (m.teams||[]).forEach(function(team,ti){
        lines.push('');
        lines.push('━━ חוליה '+(ti+1)+' ━━');
        var cn=typeof team.commander==='object'?team.commander.name||'':team.commander||'';
        var cp=typeof team.commander==='object'?team.commander.pakl||'':'';
        lines.push(nums['tcmd-'+team.id]+'. '+(cn||'ריק')+(cn&&cp?' - '+cp:''));
        (team.soldiers||[]).forEach(function(sol,si){
          var sn=typeof sol==='object'?sol.name||'':sol||'';
          var sp=typeof sol==='object'?sol.pakl||'':'';
          lines.push(nums['sol-'+team.id+'-'+si]+'. '+(sn||'ריק')+(sn&&sp?' - '+sp:''));
        });
      });
      lines.push('');
      var total2=1+(m.teams||[]).reduce(function(acc,t){return acc+1+(t.soldiers||[]).length;},0);
      lines.push('סה"כ: '+total2+' עמדות');
      if(m.dagashim&&m.dagashim.trim()){lines.push('');lines.push('📌 דגשים:');lines.push(m.dagashim.trim());}
      var text=lines.join('\n');
      var url='https://wa.me/?text='+encodeURIComponent(text);
      window.open(url,'_blank');
    });

    // עריכת שם
    card.querySelector('.mission-rename-btn').addEventListener('click',function(e){
      e.stopPropagation();
      var newName=prompt('שם חדש ליזומה:',m.name);
      if(!newName||!newName.trim())return;
      var dup=missionsState.missions.find(function(x){return x.id!==m.id&&x.name===newName.trim();});
      if(dup){toast('יזומה בשם זה כבר קיימת');return;}
      m.name=newName.trim();
      saveMission(m);
      renderMissions();
    });

    // פתיחת/סגירת פרטים — רק לחיצה על header (לא על תוכן הפרטים)
    card.addEventListener('click',function(e){
      // אל תסגור אם הלחיצה היא בתוך אזור הפרטים (input, button וכו')
      var det=document.getElementById('mdet-'+m.id);
      if(det&&det.contains(e.target))return;
      if(e.target.classList.contains('mission-delete-btn')||e.target.classList.contains('mission-rename-btn')||e.target.closest('.mission-share-btn'))return;
      var isOpen=det.style.display!=='none';
      if(isOpen){det.style.display='none';_openMissionId=null;}
      else{_openMissionId=m.id;det.style.display='block';renderMissionDetail(m,det);}
    });

    // שמור יזומה פתוחה אחרי renderMissions
    if(_openMissionId&&_openMissionId==m.id){
      setTimeout(function(){
        var det=document.getElementById('mdet-'+m.id);
        if(det&&det.style.display==='none'){det.style.display='block';renderMissionDetail(m,det);}
      },0);
    }
  });

  setupMissionDrag();
}

// חישוב מספרי ברזל היררכיים: מפקד=1, מפקד חוליה 1=2, גפרורים=3..., מפקד חוליה 2=N+1...
function calcMissionIronNums(m){
  var nums={};
  var n=1;
  nums['cmd']=n++;
  (m.teams||[]).forEach(function(team){
    nums['tcmd-'+team.id]=n++;
    (team.soldiers||[]).forEach(function(sol,si){
      nums['sol-'+team.id+'-'+si]=n++;
    });
  });
  return nums;
}

// הוספת שורת גפרור ישירות ל-DOM בלי רנדור מחדש
function addSolRowToDOM(team,m,detContainer,cont){
  var newIdx=team.soldiers.length;
  team.soldiers.push({name:'',pakl:''});if(m)saveMission(m);
  var nums2=calcMissionIronNums(m);
  var ironN2=nums2['sol-'+team.id+'-'+newIdx]||'';
  var newRow=document.createElement('div');
  newRow.style.cssText='display:flex;align-items:center;gap:4px;margin-bottom:4px;padding:2px 0';
  newRow.setAttribute('draggable','true');
  newRow.dataset.teamid=team.id;
  newRow.dataset.si=String(newIdx);
  var nb=document.createElement('div');
  nb.style.cssText='width:20px;height:20px;min-width:20px;background:#1CB86A;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0';
  nb.textContent=ironN2;
  var nInp=document.createElement('input');
  nInp.type='text';nInp.placeholder='שם חייל';nInp.autocomplete='off';
  nInp.style.cssText='flex:0.6;min-width:0;padding:6px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-family:var(--font);font-size:12px;color:var(--text)';
  var nPakl=document.createElement('input');
  nPakl.type='text';nPakl.placeholder='פק"ל';nPakl.autocomplete='off';
  nPakl.style.cssText='width:110px;flex-shrink:0;padding:6px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-family:var(--font);font-size:12px;color:var(--text)';
  var nDel=document.createElement('button');
  nDel.textContent='✕';
  nDel.style.cssText='border:none;background:transparent;color:#E8354A;font-size:14px;cursor:pointer;padding:2px 4px;font-weight:700;flex-shrink:0';
  nDel.addEventListener('click',function(e2){
    e2.stopPropagation();
    if(team.soldiers.length<=1){toast('חוליה חייבת לכלול לפחות גפרור אחד');return;}
    team.soldiers.splice(newIdx,1);if(m)saveMission(m);
    renderTeamSoldiers(team,m,detContainer);
  });
  function saveNewRow(){team.soldiers[newIdx]={name:nInp.value.trim(),pakl:nPakl.value.trim()};if(m)saveMission(m);}
  nInp.addEventListener('keydown',function(e2){
    if(e2.key==='Enter'||e2.key==='Tab'){e2.preventDefault();saveNewRow();setTimeout(function(){nPakl.focus();nPakl.scrollIntoView({block:'center',behavior:'smooth'});},50);}
  });
  nPakl.addEventListener('keydown',function(e2){
    if(e2.key==='Enter'){e2.preventDefault();saveNewRow();var c=document.getElementById('tsols-'+team.id);if(c)addSolRowToDOM(team,m,detContainer,c);}
  });
  newRow.appendChild(nb);newRow.appendChild(nInp);newRow.appendChild(nPakl);newRow.appendChild(nDel);
  cont.appendChild(newRow);
  nInp.focus();
  setTimeout(function(){nInp.scrollIntoView({block:'center',behavior:'smooth'});},50);
}


function renderTeamSoldiers(team,m,detContainer){
  var cont=document.getElementById('tsols-'+team.id);
  if(!cont)return;
  cont.innerHTML='';
  var nums=calcMissionIronNums(m);
  var soldiers=team.soldiers||[];

  soldiers.forEach(function(solObj,si){
    var solName=typeof solObj==='object'?(solObj.name||''):(solObj||'');
    var solPakl=typeof solObj==='object'?(solObj.pakl||''):'';
    var ironN=nums['sol-'+team.id+'-'+si]||'';

    var row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:4px;margin-bottom:4px;padding:2px 0';

    var numBadge=document.createElement('div');
    numBadge.style.cssText='width:20px;height:20px;min-width:20px;background:#1CB86A;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0';
    numBadge.textContent=ironN;

    var inp=document.createElement('input');
    inp.type='text';inp.value=solName;inp.placeholder='שם חייל';inp.autocomplete='off';
    inp.style.cssText='flex:0.6;min-width:0;padding:6px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-family:var(--font);font-size:12px;color:var(--text)';

    var paklInp=document.createElement('input');
    paklInp.type='text';paklInp.value=solPakl;paklInp.placeholder='פק"ל';paklInp.autocomplete='off';
    paklInp.style.cssText='width:110px;flex-shrink:0;padding:6px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-family:var(--font);font-size:12px;color:var(--text)';

    var del=document.createElement('button');
    del.textContent='✕';
    del.style.cssText='border:none;background:transparent;color:#E8354A;font-size:14px;cursor:pointer;padding:2px 4px;font-weight:700;flex-shrink:0';

    row.setAttribute('draggable','true');
    row.dataset.teamid=team.id;
    row.dataset.si=String(si);
    row.appendChild(numBadge);row.appendChild(inp);row.appendChild(paklInp);row.appendChild(del);
    cont.appendChild(row);

    // drag&drop — גרור שורה
    row.addEventListener('dragstart',function(e){
      e.stopPropagation();
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',JSON.stringify({fromTeam:team.id,fromIdx:si}));
      row.style.opacity='0.4';
    });
    row.addEventListener('dragend',function(){row.style.opacity='';});
    row.addEventListener('dragover',function(e){
      e.preventDefault();e.stopPropagation();
      e.dataTransfer.dropEffect='move';
      var rect=row.getBoundingClientRect();
      row.style.borderTop=e.clientY<rect.top+rect.height/2?'2px solid var(--blue)':'';
      row.style.borderBottom=e.clientY>=rect.top+rect.height/2?'2px solid var(--blue)':'';
    });
    row.addEventListener('dragleave',function(){row.style.borderTop='';row.style.borderBottom='';});
    row.addEventListener('drop',function(e){
      e.preventDefault();e.stopPropagation();
      row.style.borderTop='';row.style.borderBottom='';
      try{
        var data=JSON.parse(e.dataTransfer.getData('text/plain'));
        var fromTeamObj=m.teams.find(function(x){return x.id==data.fromTeam;});
        var toTeamObj=team;
        if(!fromTeamObj||!toTeamObj)return;
        var soldier=fromTeamObj.soldiers.splice(data.fromIdx,1)[0];
        if(fromTeamObj.soldiers.length<1)fromTeamObj.soldiers.push({name:'',pakl:''});
        var rect2=row.getBoundingClientRect();
        var toIdx=si;
        if(e.clientY>=rect2.top+rect2.height/2)toIdx++;
        if(fromTeamObj===toTeamObj&&data.fromIdx<toIdx)toIdx--;
        toTeamObj.soldiers.splice(toIdx,0,soldier);
        if(m)saveMission(m);
        m.teams.forEach(function(t){renderTeamSoldiers(t,m,detContainer);});
      }catch(ex){}
    });

    function saveRow(){team.soldiers[si]={name:inp.value.trim(),pakl:paklInp.value.trim()};if(m)saveMission(m);}
    inp.addEventListener('keydown',function(e){
      if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();saveRow();setTimeout(function(){paklInp.focus();paklInp.scrollIntoView({block:'center',behavior:'smooth'});},50);}
    });
    paklInp.addEventListener('keydown',function(e){
      if(e.key==='Enter'){
        e.preventDefault();saveRow();
        var newCont=document.getElementById('tsols-'+team.id);
        if(newCont)addSolRowToDOM(team,m,detContainer,newCont);
      }
    });

    del.addEventListener('click',function(e){
      e.stopPropagation();
      if(team.soldiers.length<=1){toast('חוליה חייבת לכלול לפחות גפרור אחד');return;}
      team.soldiers.splice(si,1);if(m)saveMission(m);
      renderTeamSoldiers(team,m,detContainer);
    });
  });

  // drop zone על ה-container עצמו = הוסף בסוף
  cont.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';});
  cont.addEventListener('drop',function(e){
    if(e.target!==cont)return;
    e.preventDefault();e.stopPropagation();
    try{
      var data=JSON.parse(e.dataTransfer.getData('text/plain'));
      var fromTeamObj=m.teams.find(function(x){return x.id==data.fromTeam;});
      if(!fromTeamObj)return;
      var soldier=fromTeamObj.soldiers.splice(data.fromIdx,1)[0];
      if(fromTeamObj.soldiers.length<1)fromTeamObj.soldiers.push({name:'',pakl:''});
      team.soldiers.push(soldier);
      if(m)saveMission(m);
      m.teams.forEach(function(t){renderTeamSoldiers(t,m,detContainer);});
    }catch(ex){}
  });
}

function openIronEdit(m){
  var cur=m.ironNum;
  var newNum=parseInt(prompt('שנה מספר ברזל ל:',cur),10);
  if(isNaN(newNum)||newNum<1||newNum>missionsState.missions.length)return;
  missionsState.missions=missionsState.missions.filter(function(x){return x.id!==m.id;});
  m.ironNum=newNum;
  missionsState.missions.splice(newNum-1,0,m);
  missionsState.missions.forEach(function(x,i){x.ironNum=i+1;saveMission(x);});
  renderMissions();
  toast('מספר ברזל עודכן ✓');
}

function setupMissionDrag(){
  var wrap=document.getElementById('missions-wrap');
  var cards=wrap.querySelectorAll('.mission-card');
  var dragSrc=null;
  cards.forEach(function(card){
    card.setAttribute('draggable','true');
    card.addEventListener('dragstart',function(e){dragSrc=this;this.style.opacity='.5';e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',function(){this.style.opacity='';dragSrc=null;});
    card.addEventListener('dragover',function(e){e.preventDefault();e.dataTransfer.dropEffect='move';});
    card.addEventListener('drop',function(e){
      e.stopPropagation();
      if(dragSrc===this)return;
      var fromId=parseInt(dragSrc.dataset.id);
      var toId=parseInt(this.dataset.id);
      var fromIdx=missionsState.missions.findIndex(function(x){return x.id===fromId;});
      var toIdx=missionsState.missions.findIndex(function(x){return x.id===toId;});
      var spliced=missionsState.missions.splice(fromIdx,1)[0];
      missionsState.missions.splice(toIdx,0,spliced);
      missionsState.missions.forEach(function(x,i){x.ironNum=i+1;saveMission(x);});
      renderMissions();
    });
  });
}

// אבטחה — PIN פעם ביום
(function(){
  var PIN='3194';
  var entered='';
  var pinScreen=document.getElementById('pin-screen');

  // בדוק אם כבר הוזן היום
  function alreadyUnlockedToday(){
    var last=localStorage.getItem('pinLastUnlock');
    if(!last)return false;
    var lastDate=new Date(parseInt(last));
    var now=new Date();
    return lastDate.getFullYear()===now.getFullYear()&&
           lastDate.getMonth()===now.getMonth()&&
           lastDate.getDate()===now.getDate();
  }

  if(alreadyUnlockedToday()){
    pinScreen.style.display='none';
    return;
  }

  function updateDots(){
    document.querySelectorAll('.pin-dot').forEach(function(d,i){
      d.classList.toggle('filled',i<entered.length);
    });
  }
  function setError(msg){
    document.getElementById('pin-error').textContent=msg;
    setTimeout(function(){document.getElementById('pin-error').textContent='';},1800);
  }
  function shake(){
    var dots=document.getElementById('pin-dots');
    dots.style.animation='none';
    setTimeout(function(){dots.style.animation='pinShake .4s ease';},10);
  }

  function tryPin(){
    if(entered===PIN){
      localStorage.setItem('pinLastUnlock',Date.now().toString());
      pinScreen.style.display='none';
    } else {
      shake();
      setError('קוד שגוי, נסה שוב');
      entered='';
      updateDots();
    }
  }

  document.querySelectorAll('.pin-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var d=btn.dataset.d;
      if(d==='del'){entered=entered.slice(0,-1);}
      else{if(entered.length>=4)return;entered+=d;if(entered.length===4)setTimeout(tryPin,120);}
      updateDots();
    });
  });
})();

var _lastBack=0;

function _handleBack(){
  var now=Date.now();
  if(now-_lastBack<400)return;
  _lastBack=now;

  // lightbox פתוח
  if(document.getElementById('photo-lightbox').style.display==='flex'){
    document.getElementById('photo-lightbox').style.display='none';return;
  }
  // מודל נעדרים פתוח
  if(document.getElementById('modal-missing').classList.contains('show')){
    closeMissingModal();return;
  }
  // מודל דו"ח פתוח
  if(document.getElementById('modal-report').classList.contains('show')){
    closeReportModal();return;
  }
  // במסך פרטי חייל
  var scrDet=document.getElementById('scr-det');
  var isInDetail=state.active!==null&&!scrDet.classList.contains('hidden');
  if(isInDetail){
    var sol=find(state.active);
    var isNew=sol&&!sol.name.trim();
    // נעדר → תמיד חזור למסך נעדרים
    if(sol&&sol.isMissing){
      var activeId=state.active;
      state.soldiers=state.soldiers.filter(function(x){return x.id!==activeId;});
      state.active=null;
      document.getElementById('scr-det').classList.add('hidden');
      document.getElementById('scr-main').classList.remove('slide-left');
      document.querySelector('.tabs-bar').style.display='flex';
      document.getElementById('modal-missing').classList.add('show');
      renderMissingList();
      return;
    }
    var infoPanel=document.getElementById('tab-info');
    if(infoPanel.classList.contains('active')){
      if(isNew){
        state.soldiers=state.soldiers.filter(function(x){return x.id!==state.active;});
        deleteSoldierRemote(state.active);
        showMain();
      } else {
        // מפרטים → יציאות
        document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.tab==='leaves');});
        document.getElementById('tab-leaves').classList.add('active');
        document.getElementById('tab-info').classList.remove('active');
      }
    } else {
      // מיציאות → דשבורד
      if(isNew){state.soldiers=state.soldiers.filter(function(x){return x.id!==state.active;});deleteSoldierRemote(state.active);}
      showMain();
    }
    return;
  }
  // פילטר פעיל → נקה
  if(state.filter!=='all'){setFilter('all');return;}
  // סטטיסטיקות פתוח → חזור לחיילים
  var statsTab=document.getElementById('main-tab-stats');
  if(statsTab&&statsTab.style.display!=='none'){
    document.querySelectorAll('.main-tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.mtab==='list');});
    document.getElementById('main-tab-list').style.display='';
    statsTab.style.display='none';
    document.getElementById('fab').style.display='';
    document.querySelector('.dashboard').style.display='';
    return;
  }
  // יזומות פתוח → חזור לחיילים
  var missTab=document.getElementById('main-tab-missions');
  if(missTab&&missTab.style.display!=='none'){
    document.querySelectorAll('.main-tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.mtab==='list');});
    document.getElementById('main-tab-list').style.display='';
    missTab.style.display='none';
    document.getElementById('fab').style.display='';
    document.querySelector('.dashboard').style.display='';
    return;
  }
  // לוח שבועי פתוח → חזור לחיילים
  var weekTab=document.getElementById('main-tab-week');
  if(weekTab&&weekTab.style.display!=='none'){
    document.querySelectorAll('.main-tab-btn').forEach(function(b){b.classList.toggle('active',b.dataset.mtab==='list');});
    document.getElementById('main-tab-list').style.display='';
    weekTab.style.display='none';
    document.getElementById('fab').style.display='';
    document.querySelector('.dashboard').style.display='';
    return;
  }
  // דשבורד — נשאר
}

  var THRESHOLD=70;

  function isMainVisible(){
    var m=document.getElementById('scr-main');
    return m&&!m.classList.contains('hidden')&&!m.classList.contains('slide-left');
  }
  function getActiveScroll(){
    var list=document.getElementById('main-tab-list');
    var week=document.getElementById('main-tab-week');
    if(list&&list.style.display!=='none')return list;
    if(week&&week.style.display!=='none')return week;
    return null;
  }

  document.addEventListener('touchstart',function(e){
    var el=getActiveScroll();
    var missingOpen=document.getElementById('modal-missing').classList.contains('show');
    if(el&&el.scrollTop===0&&isMainVisible()&&!missingOpen){
      startY=e.touches[0].clientY;pulling=true;triggered=false;
    }
  },{passive:true});

  document.addEventListener('touchmove',function(e){
    if(!pulling)return;
    var dy=e.touches[0].clientY-startY;
    if(dy<=0){indicator.style.height='0';return;}
    var h=Math.min(dy*0.5,THRESHOLD);
    indicator.style.height=h+'px';
    spinner.style.transform='rotate('+(h/THRESHOLD*360)+'deg)';
    if(h>=THRESHOLD&&!triggered){triggered=true;spinner.style.borderTopColor='var(--green)';}
  },{passive:true});

  document.addEventListener('touchend',function(){
    if(!pulling)return;
    pulling=false;
    if(triggered){
      indicator.style.height='50px';
      spinner.style.animation='spin .6s linear infinite';
      setTimeout(function(){location.reload();},600);
    } else {
      indicator.style.height='0';
      spinner.style.borderTopColor='var(--blue)';
    }
  });
})();
startSync();
scheduleMidnightCheck();
// תיקון: כשמקלדת נסגרת viewport לא חוזר — גורם לנעלם של bottom bar
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',function(){
    document.body.style.height=window.visualViewport.height+'px';
    setTimeout(function(){document.body.style.height='';},300);
  });
}
})();
</script>
</body>
</html>
